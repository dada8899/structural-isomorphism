# /etc/nginx/conf.d/beta-structural.conf — authoritative repo mirror
#
# Source of truth: VPS 43.156.233.71:/etc/nginx/conf.d/beta-structural.conf
# Last synced: 2026-05-14 (session #9 W1-D)
#
# IMPORTANT: nginx here is a pure reverse proxy. ALL routing (including
# /phenomenon, /phenomenon/:id, /analyze, .html aliases) is resolved by
# the FastAPI backend at 127.0.0.1:5004 (see web/backend/main.py).
#
# Do not add try_files / static-file fallbacks here — they would shadow
# the backend routes and break deep-link forms.

server {
    server_name beta.structural.bytedance.city;

    # Temp: allow certbot http-01
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # SSE 流式路由 (analogy-detail/stream + analogy/stream + deep-report)
    # buffering off is required to flush tokens to client in real time.
    location ~ ^/phase/api/(analogy(-detail)?/stream|memo/stream|deep-report)$ {
        proxy_pass http://127.0.0.1:5004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:5004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/beta.structural.bytedance.city/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/beta.structural.bytedance.city/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = beta.structural.bytedance.city) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name beta.structural.bytedance.city;
    return 404; # managed by Certbot
}
