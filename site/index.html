  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #3370ff;
      --primary-light: #e8f0fe;
      --primary-dark: #2860e0;
      --bg: #f5f6f7;
      --bg-sidebar: #ffffff;
      --bg-content: #ffffff;
      --text: #1f2329;
      --text-secondary: #646a73;
      --text-muted: #8f959e;
      --border: #dee0e3;
      --border-light: #eef0f2;
      --hover-bg: #f0f1f2;
      --active-bg: #e1eaff;
      --topbar-h: 52px;
      --sidebar-w: 280px;
      --toc-w: 220px;
      --shadow: 0 1px 2px rgba(0,0,0,0.06);
      --radius: 6px;
      --code-bg: #f4f5f6;
      --blockquote-bg: #f0f4ff;
    }

    [data-theme="dark"] {
      --primary: #4e83fd;
      --primary-light: #1a2744;
      --primary-dark: #6b9bff;
      --bg: #1a1a1a;
      --bg-sidebar: #1e1e1e;
      --bg-content: #222222;
      --text: #d4d4d4;
      --text-secondary: #a0a0a0;
      --text-muted: #707070;
      --border: #333333;
      --border-light: #2a2a2a;
      --hover-bg: #2a2a2a;
      --active-bg: #1a2744;
      --shadow: 0 1px 2px rgba(0,0,0,0.2);
      --code-bg: #2d2d2d;
      --blockquote-bg: #1a2744;
    }

    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
    }

    /* === Top Bar === */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      height: var(--topbar-h);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 10px;
    }
    .topbar-logo {
      width: 28px; height: 28px;
      background: var(--primary);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 12px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 4px;
    }
    .topbar-right a, .topbar-right button {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: var(--radius);
      transition: all 0.15s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .topbar-right a:hover, .topbar-right button:hover {
      background: var(--hover-bg);
      color: var(--primary);
    }
    .menu-toggle {
      display: none;
      background: none; border: none;
      font-size: 18px; cursor: pointer;
      color: var(--text);
      padding: 4px 8px;
      border-radius: var(--radius);
    }
    .menu-toggle:hover { background: var(--hover-bg); }

    /* === Layout === */
    .layout {
      display: flex;
      margin-top: var(--topbar-h);
      height: calc(100vh - var(--topbar-h));
    }

    /* === Left Sidebar (Doc Tree) === */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 0 20px;
      z-index: 100;
      transition: transform 0.25s ease;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Tree group */
    .tree-group {
      margin-bottom: 4px;
    }
    .tree-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      border-radius: 0;
    }
    .tree-group-header:hover {
      background: var(--hover-bg);
    }
    .tree-group-header .icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .tree-group-header .arrow {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
      margin-left: auto;
      flex-shrink: 0;
    }
    .tree-group.collapsed .arrow {
      transform: rotate(-90deg);
    }
    .tree-group.collapsed .tree-items {
      display: none;
    }
    .tree-items {
      padding: 0;
    }
    .tree-item {
      display: block;
      padding: 6px 16px 6px 42px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.1s;
      border-left: 2px solid transparent;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-item:hover {
      background: var(--hover-bg);
      color: var(--text);
    }
    .tree-item.active {
      background: var(--active-bg);
      color: var(--primary);
      font-weight: 500;
      border-left-color: var(--primary);
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }

    /* === Main Content === */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      margin-right: 0;
      overflow-y: auto;
      height: 100%;
      background: var(--bg);
    }
    .main-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 48px 80px;
    }
    .main.has-toc {
      margin-right: var(--toc-w);
    }

    /* Welcome / Landing */
    .welcome {
      text-align: center;
      padding: 60px 20px 40px;
    }
    .welcome h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .welcome .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.8;
      max-width: 600px;
      margin: 0 auto 36px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 600px;
      margin: 0 auto 40px;
      text-align: left;
    }
    .status-card {
      background: var(--bg-content);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .status-card h3 {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .status-card .version {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .progress-bar {
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s;
    }
    .progress-fill.v1 { background: var(--primary); width: 35%; }
    .progress-fill.v2 { background: #34a853; width: 10%; }
    .status-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
    }
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-content);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-link:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* === Article Content === */
    .article-meta {
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      align-items: center;
    }
    #content h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
      letter-spacing: -0.3px;
    }
    #content h2 {
      font-size: 21px;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }
    #content h3 {
      font-size: 17px;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 10px;
    }
    #content h4 {
      font-size: 15px;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 8px;
    }
    #content p {
      margin-bottom: 14px;
      line-height: 1.8;
    }
    #content ul, #content ol {
      margin-bottom: 14px;
      padding-left: 24px;
    }
    #content li {
      margin-bottom: 4px;
      line-height: 1.8;
    }
    #content blockquote {
      border-left: 3px solid var(--primary);
      padding: 12px 20px;
      margin: 14px 0;
      background: var(--blockquote-bg);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    #content blockquote p { margin-bottom: 0; }
    #content code {
      font-family: "JetBrains Mono", "Menlo", monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 3px;
    }
    #content pre {
      margin: 14px 0;
      border-radius: 8px;
      overflow-x: auto;
    }
    #content pre code {
      display: block;
      padding: 16px 20px;
      background: var(--code-bg);
      line-height: 1.6;
      font-size: 13px;
    }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    #content th {
      background: var(--hover-bg);
      font-weight: 600;
    }
    #content strong { font-weight: 600; }
    #content hr {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 28px 0;
    }
    #content img {
      max-width: 100%;
      border-radius: var(--radius);
    }

    /* === Right TOC === */
    .toc {
      width: var(--toc-w);
      position: fixed;
      top: var(--topbar-h);
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 16px 12px;
      border-left: 1px solid var(--border);
      background: var(--bg-sidebar);
      scrollbar-width: thin;
    }
    .toc h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
      padding-left: 8px;
    }
    .toc a {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 3px 8px;
      line-height: 1.5;
      border-left: 2px solid transparent;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toc a:hover { color: var(--text); }
    .toc a.active {
      color: var(--primary);
      border-left-color: var(--primary);
    }
    .toc a.toc-h3 { padding-left: 20px; }

    /* === Loading === */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .loading .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === Footer === */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 20px;
      margin-top: 40px;
      border-top: 1px solid var(--border-light);
    }

    /* === Responsive === */
    @media (max-width: 1100px) {
      .toc { display: none; }
      .main.has-toc { margin-right: 0; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 16px rgba(0,0,0,0.1); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .main-inner { padding: 24px 18px 60px; }
      .menu-toggle { display: block; }
      #content h1 { font-size: 22px; }
      #content h2 { font-size: 18px; }
      .welcome h1 { font-size: 24px; }
      .status-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// Flatten for lookup
const ALL_DOCS = DOC_TREE.flatMap(g => g.items);

// === State ===
let currentSlug = null;

// === Theme ===
function initTheme() {
  const saved = localStorage.getItem('si-theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('hljs-light').disabled = true;
    document.getElementById('hljs-dark').disabled = false;
  }
}
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('hljs-light').disabled = false;
    document.getElementById('hljs-dark').disabled = true;
    localStorage.setItem('si-theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('hljs-light').disabled = true;
    document.getElementById('hljs-dark').disabled = false;
    localStorage.setItem('si-theme', 'dark');
  }
}
initTheme();
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

// === Build Sidebar ===
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  DOC_TREE.forEach((group, gi) => {
    const div = document.createElement('div');
    div.className = 'tree-group';
    div.dataset.groupIndex = gi;

    const header = document.createElement('div');
    header.className = 'tree-group-header';
    header.innerHTML = `<span class="icon">${group.icon}</span><span>${group.label}</span><span class="arrow">\u25BC</span>`;
    header.addEventListener('click', () => {
      div.classList.toggle('collapsed');
    });
    div.appendChild(header);

    const items = document.createElement('div');
    items.className = 'tree-items';
    group.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'tree-item';
      a.textContent = item.title;
      a.dataset.slug = item.slug;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        navigateTo(item.slug);
      });
      items.appendChild(a);
    });
    div.appendChild(items);
    sidebar.appendChild(div);
  });
}

// === Highlight active item ===
function setActiveItem(slug) {
  document.querySelectorAll('.tree-item').forEach(a => {
    a.classList.toggle('active', a.dataset.slug === slug);
  });

// === Load Document ===
async function loadDoc(slug) {
  const mainInner = document.getElementById('mainInner');
  mainInner.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

  try {
    const resp = await fetch('docs/' + slug + '.md');
    if (!resp.ok) throw new Error('not found: ' + slug);
    var md = await resp.text();

    // Strip YAML frontmatter
    if (md.startsWith('---')) {
      var end = md.indexOf('---', 3);
      if (end > 0) md = md.substring(end + 3).trim();
    }

    // Render markdown to HTML
    var html = marked.parse(md);

    // Word count from source
    var textOnly = md.replace(/[#*_\[\]()>|\-`]/g, '').replace(/\s+/g, '');
    var words = textOnly.length;
    var readTime = Math.ceil(words / 500);

    // Build DOM safely (avoid template literals that break on backticks in content)
    mainInner.innerHTML = '';

    var metaDiv = document.createElement('div');
    metaDiv.className = 'article-meta';
    metaDiv.id = 'article-meta';
    metaDiv.innerHTML = '<span>' + words.toLocaleString() + ' 字</span><span>预计阅读 ' + readTime + ' 分钟</span>';
    mainInner.appendChild(metaDiv);

    var article = document.createElement('article');
    article.id = 'content';
    article.innerHTML = html;
    mainInner.appendChild(article);

    var footer = document.createElement('div');
    footer.className = 'footer-note';
    footer.textContent = 'Structural Isomorphism Project \u00A9 2026';
    mainInner.appendChild(footer);

    // Highlight code
    if (typeof hljs !== 'undefined') {
      document.querySelectorAll('#content pre code').forEach(function(block) {
        try { hljs.highlightElement(block); } catch(e) {}
      });
    }

    // Page title
    var h1 = document.querySelector('#content h1');
    if (h1) document.title = h1.textContent + ' — 结构同构';

    // Build TOC
    buildTOC();

  } catch (e) {
    console.error('loadDoc error:', e);
    mainInner.innerHTML = '<div class="loading"><p>文档加载失败：' + slug + '</p><p>' + e.message + '</p><p style="margin-top:12px"><a href="#" onclick="navigateTo(null);return false;" style="color:var(--primary)">返回首页</a></p></div>';
    var tocEl = document.getElementById('toc');
    if (tocEl) tocEl.style.display = 'none';
    var mainEl = document.getElementById('main');
    if (mainEl) mainEl.classList.remove('has-toc');
  }
}

// === TOC ===
function buildTOC() {
  const toc = document.getElementById('toc');
  const headings = document.querySelectorAll('#content h2, #content h3');

  if (headings.length === 0) {
    toc.style.display = 'none';
    document.getElementById('main').classList.remove('has-toc');
    return;
  }

  toc.style.display = '';
  document.getElementById('main').classList.add('has-toc');

  // Clear
  toc.querySelectorAll('a').forEach(a => a.remove());

  headings.forEach((h, i) => {
    const id = 'sec-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('toc-h3');
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    toc.appendChild(a);
  });

  // Scroll spy
  const tocLinks = toc.querySelectorAll('a');
  const mainEl = document.getElementById('main');
  let ticking = false;

  mainEl.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        let activeIdx = 0;
        const scrollTop = mainEl.scrollTop + 80;
        headings.forEach((h, i) => {
          if (h.offsetTop <= scrollTop) activeIdx = i;
        });
        tocLinks.forEach((l, i) => l.classList.toggle('active', i === activeIdx));
        ticking = false;
      });
      ticking = true;
    }
  });
}
