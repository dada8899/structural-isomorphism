<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档阅读 — 跨领域结构同构搜索引擎</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a73e8;
      --primary-light: #e8f0fe;
      --bg: #f7f8fa;
      --text: #1f2329;
      --text-secondary: #646a73;
      --card-bg: #ffffff;
      --border: #e0e0e0;
      --sidebar-w: 260px;
      --toc-w: 220px;
      --topbar-h: 52px;
    }

    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
    }

    /* Top Bar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      height: var(--topbar-h);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 10px;
    }
    .topbar-logo {
      width: 28px; height: 28px;
      background: var(--primary);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 13px;
      text-decoration: none;
    }
    .topbar-title {
      font-size: 14px; font-weight: 600;
    }
    .topbar-title a {
      color: var(--text); text-decoration: none;
    }
    .topbar-title a:hover { color: var(--primary); }
    .topbar-right a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
    }
    .topbar-right a:hover {
      background: var(--primary-light);
      color: var(--primary);
    }
    .menu-toggle {
      display: none;
      background: none; border: none;
      font-size: 20px; cursor: pointer;
      color: var(--text);
      padding: 4px 8px;
    }

    /* Layout */
    .layout {
      display: flex;
      margin-top: var(--topbar-h);
      min-height: calc(100vh - var(--topbar-h));
    }

    /* Left Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 16px 0;
      z-index: 100;
      transition: transform 0.25s ease;
    }
    .sidebar h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      padding: 8px 20px 6px;
      font-weight: 600;
    }
    .sidebar a {
      display: block;
      padding: 7px 20px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .sidebar a:hover {
      background: var(--primary-light);
      color: var(--primary);
    }
    .sidebar a.active {
      color: var(--primary);
      font-weight: 600;
      border-left-color: var(--primary);
      background: var(--primary-light);
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }

    /* Main Content */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      margin-right: var(--toc-w);
      padding: 32px 48px 60px;
      max-width: 100%;
      min-width: 0;
    }

    /* Article Styles */
    .article-meta {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      gap: 16px;
    }
    #content {
      max-width: 720px;
    }
    #content h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
      letter-spacing: -0.3px;
    }
    #content h2 {
      font-size: 22px;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    #content h3 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 12px;
    }
    #content h4 {
      font-size: 16px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    #content p {
      margin-bottom: 16px;
      line-height: 1.8;
    }
    #content ul, #content ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }
    #content li {
      margin-bottom: 6px;
      line-height: 1.8;
    }
    #content blockquote {
      border-left: 3px solid var(--primary);
      padding: 12px 20px;
      margin: 16px 0;
      background: var(--primary-light);
      border-radius: 0 6px 6px 0;
      color: var(--text);
    }
    #content blockquote p { margin-bottom: 0; }
    #content code {
      font-family: "JetBrains Mono", "Menlo", "Monaco", "Consolas", monospace;
      font-size: 0.9em;
      background: #f0f2f5;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #content pre {
      margin: 16px 0;
      border-radius: 8px;
      overflow-x: auto;
    }
    #content pre code {
      display: block;
      padding: 16px 20px;
      background: #f6f8fa;
      line-height: 1.6;
      font-size: 13px;
    }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 10px 14px;
      text-align: left;
    }
    #content th {
      background: #f7f8fa;
      font-weight: 600;
    }
    #content strong {
      font-weight: 600;
    }
    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* Right TOC */
    .toc {
      width: var(--toc-w);
      position: fixed;
      top: var(--topbar-h);
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 20px 16px;
      border-left: 1px solid var(--border);
      background: var(--card-bg);
    }
    .toc h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .toc a {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 3px 0 3px 0;
      line-height: 1.5;
      border-left: 2px solid transparent;
      padding-left: 10px;
      transition: all 0.15s;
    }
    .toc a:hover {
      color: var(--primary);
    }
    .toc a.active {
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 500;
    }
    .toc a.toc-h3 {
      padding-left: 22px;
      font-size: 12px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
    }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid #eee;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 1100px) {
      .toc { display: none; }
      .main { margin-right: 0; }
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-overlay.open {
        display: block;
      }
      .main {
        margin-left: 0;
        padding: 24px 20px 48px;
      }
      .menu-toggle { display: block; }
      #content h1 { font-size: 22px; }
      #content h2 { font-size: 18px; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <button class="menu-toggle" id="menuToggle">&#9776;</button>
    <a href="index.html" class="topbar-logo">SI</a>
    <span class="topbar-title"><a href="index.html">Structural Isomorphism</a></span>
  </div>
  <div class="topbar-right">
    <a href="https://monitor.bytedance.city" target="_blank">Monitor</a>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <h4>Documents</h4>
  </aside>

  <main class="main">
    <div class="article-meta" id="article-meta"></div>
    <article id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading document...</p>
      </div>
    </article>
  </main>

  <aside class="toc" id="toc">
    <h4>On This Page</h4>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<script>
hljs.registerLanguage('python', window.hljsDefinePython || hljs.getLanguage('python')?.rawDefinition || function(){return{}});

const DOCS = [
  { slug: '01-project-overview', title: '01 - 项目概述' },
  { slug: '02-thinking-chain', title: '02 - 思考链路' },
  { slug: '03-core-framework', title: '03 - 核心框架' },
  { slug: '04-experiments', title: '04 - 实验记录' },
  { slug: '05-v1-progress', title: '05 - V1：结构同构模型' },
  { slug: '06-v2-plan', title: '06 - V2：异常探测器' },
  { slug: '07-roadmap', title: '07 - 路线图' },
  { slug: '08-technical-details', title: '08 - 技术细节' },
  { slug: '09-application-scenarios', title: '09 - 应用场景' },
  { slug: '10-discovery-after-isomorphism', title: '10 - 发现同构后能做什么' },
];

// Build sidebar
const sidebar = document.getElementById('sidebar');
const currentSlug = new URLSearchParams(location.search).get('doc') || DOCS[0].slug;

DOCS.forEach(d => {
  const a = document.createElement('a');
  a.href = `?doc=${d.slug}`;
  a.textContent = d.title;
  if (d.slug === currentSlug) a.classList.add('active');
  sidebar.appendChild(a);
});

// Mobile menu
const menuToggle = document.getElementById('menuToggle');
const overlay = document.getElementById('sidebarOverlay');
menuToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
});

// Configure marked
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: false,
  gfm: true,
});

// Load doc
async function loadDoc(slug) {
  try {
    const resp = await fetch(`docs/${slug}.md`);
    if (!resp.ok) throw new Error('not found');
    const md = await resp.text();

    // Render
    document.getElementById('content').innerHTML = marked.parse(md);

    // Word count
    const text = document.getElementById('content').textContent;
    const words = text.replace(/\s+/g, '').length;
    const readTime = Math.ceil(words / 500);
    document.getElementById('article-meta').innerHTML =
      `<span>${words.toLocaleString()} 字</span><span>预计阅读 ${readTime} 分钟</span>`;

    // Page title
    const h1 = document.querySelector('#content h1');
    if (h1) document.title = h1.textContent + ' — 结构同构项目';

    // Build TOC
    buildTOC();

    // Highlight code
    document.querySelectorAll('#content pre code').forEach(block => {
      hljs.highlightElement(block);
    });

  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="loading"><p>Document not found: ${slug}</p><p><a href="index.html">Back to Dashboard</a></p></div>`;
    document.getElementById('article-meta').innerHTML = '';
  }
}

function buildTOC() {
  const toc = document.getElementById('toc');
  const headings = document.querySelectorAll('#content h2, #content h3');
  // Clear old links (keep h4)
  toc.querySelectorAll('a').forEach(a => a.remove());

  headings.forEach((h, i) => {
    const id = 'heading-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('toc-h3');
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    toc.appendChild(a);
  });

  // Scroll spy
  if (headings.length === 0) return;
  const tocLinks = toc.querySelectorAll('a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocLinks.forEach(l => l.classList.remove('active'));
        const idx = Array.from(headings).indexOf(entry.target);
        if (idx >= 0 && tocLinks[idx]) tocLinks[idx].classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));
}

loadDoc(currentSlug);
</script>

</body>
</html>
