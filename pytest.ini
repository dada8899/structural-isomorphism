[pytest]
markers =
    sanity: deterministic offline regression tests (< 30s total budget)
    integration: cross-module / API contract / DB schema tests (< 2min)
    e2e: real-network end-to-end against live deployed sites (< 5min, may be flaky)
    slow: long-running tests (skipped on PR, run nightly)
    requires_internet: tests that hit external APIs / public network
    requires_llm: tests that hit LLM provider (skip if no key)

testpaths =
    v4/tests
    v4/product/d1_phase_detector/api/tests
    v4/product/d1_phase_detector/tests
    tests/e2e

# Default: skip e2e unless explicitly opted in via -m
# Run e2e:        pytest -m e2e
# Run sanity:     pytest v4/tests/sanity -m sanity
# Run all unit+integration (no live network):
#                 pytest -m "not e2e and not slow"
# PR-time CI profile (fast):
#                 pytest -m "not slow and not requires_internet and not requires_llm"
# Nightly profile (everything except keyless LLM):
#                 pytest -m "not requires_llm"
