  <script>
    const mdContent = "# Tesla (TSLA) — 一块已经跌破居里温度的磁铁，靠惯性还在发光\n\n**股票代码**：TSLA\n**市值**：约 7500 亿美元\n**行业**：电动车 / 能源存储 / AI 机器人（愿景）\n**报告日期**：2026-04-15\n\n---\n\n## 一、核心观点\n\n> **Tesla 不是一家\"AI 转型中的车企\"，它是一个数学上已经跌破临界点的 bistable 系统。它的\"增长叙事\"正在靠弛豫惯性撑着——系统早已朝着另一个稳态滑去，只是还没滑到底而已。**\n\n### 1.1 为什么这么说\n\n过去 15 年，Tesla 的叙事一直是\"EV 将取代燃油车\"。从系统动力学角度看，这是一个经典的**双稳态切换（bistable switch）**问题：一个市场要么主流是燃油车，要么主流是电动车，**中间没有稳定的 50/50**。原因很简单——加油站网络和充电网络有正反馈效应，一旦某一方获得压倒性份额，另一方会越来越没生意，基础设施萎缩，然后消失。\n\nTesla 的早期故事是：\"我们用 Model S、Model 3、Model Y 把 EV 从 niche 推过临界点，让正反馈启动，一旦启动就停不下来。\"\n\n**这个故事在 2020-2022 年看起来正在成真**。EV 销量曲线陡峭上升，Tesla 股价涨 10 倍。\n\n但 2023 年开始，有些东西变了：\n\n1. **全球 EV 销量增速从 40%+ 降到 20%**，2024 年首次出现多国同比下滑\n2. **Tesla 自己的销量 2024 年同比下滑 1%，2025 年进一步下滑**\n3. **毛利率从 30% 降到 18%**\n4. **BYD 在全球销量上超越 Tesla**\n5. **传统车企（Ford、GM、大众）推迟 EV 投入，部分车型砍掉**\n\n这不是\"EV 革命在减速\"，**这是系统正在从\"EV 主导稳态\"回退到\"燃油车 + EV 共存稳态\"**。数学上——**外部控制参数已经跌破了临界值**。\n\nTesla 的估值隐含着\"第一种稳态会胜出\"。但**那个稳态在数学上可能已经不存在了**。\n\n### 1.2 一个预测\n\n**FSD 不是时间价值 call option，是 Allee 阈值问题**——它需要达到 300 万以上的活跃用户才能自持（数据飞轮、monetization、监管信任），目前只有约 60 万。这个差距**时间越长越大，不是越小**。\n\n三情境 2028 年市值预测：\n\n| 情境 | 概率 | 2028 市值 | 触发逻辑 |\n|---|---|---|---|\n| Bull：Model 2 + FSD 破圈 + 机器人变现 | 15% | 1.2-1.5T | 回到上臂稳态 |\n| **Base：弛豫惯性继续下滑** | **60%** | **2500-3800 亿** | 目前的趋势线性外推 |\n| Bear：FSD 失败 + Energy 增长放缓 | 25% | 1500-2200 亿 | 跌到下臂稳态 |\n\n**关键认知差**：市场给 Tesla 的估值隐含着 Bull 情境有 50%+ 的概率。我的结构分析说只有 15%。\n\n### 1.3 这份报告不讨论什么\n\n不讨论 Elon Musk 本人、Twitter/X 的影响、政治风险、SpaceX/xAI 的关联估值。只讨论 Tesla 本体业务的**动力学结构**——EV 市场是不是已经越过了数学临界点，FSD 的 Allee 阈值离自持还有多远。\n\n---\n\n## 二、详细论证\n\n下面用三个来自物理、数学、生态学的经典模型，分别看 Tesla 的一面。\n\n### 2.1 视角一：居里温度——磁铁的失序相变\n\n#### 这个理论讲什么（零前置）\n\n拿一块普通的铁磁铁。它能吸引铁钉，指南针里的磁针永远指向北。为什么？因为磁铁内部的亿万个原子，每个都是一个\"小磁针\"，它们**集体朝着同一个方向排列**。这种\"集体对齐\"是磁性的来源。\n\n现在把这块磁铁加热。温度升高到某个特定值——对铁来说是 **770 摄氏度**——一件神奇的事情发生了：**磁性突然消失了**。磁铁不再能吸引铁钉，指南针变成普通的钢片。这个温度叫**居里温度（Curie Temperature）$T_c$**。\n\n为什么会这样？\n\n在低温下，原子的热运动很弱，小磁针之间的相互作用占主导——每个原子都被邻居\"说服\"朝同一方向。这种\"从众效应\"让整块磁铁保持集体对齐。\n\n温度升高后，热运动越来越强，原子越来越\"叛逆\"——它们不再听邻居的，开始乱转。\n\n在**居里温度那一刻**，叛逆超过了从众。整个系统从\"有序\"瞬间变成\"无序\"。**这不是渐变的过程**——温度从 $T_c - 1$ 到 $T_c + 1$ 的两度区间里，系统状态彻底改变。\n\n物理学家把这写成 **Ising 模型**的方程（简化版）：\n\n$$M = \\begin{cases} M_0 \\cdot (1 - T/T_c)^\\beta & \\text{if } T < T_c \\\\ 0 & \\text{if } T > T_c \\end{cases}$$\n\n翻译：\n- $M$ 是磁化强度（整块磁铁的磁性）\n- $T$ 是温度\n- $T_c$ 是居里温度（临界点）\n- $\\beta$ 是临界指数（一个表征\"突变陡峭度\"的数字，对铁磁大约 1/3）\n\n**最神奇的一点**：在 $T_c$ 附近，系统有一种\"犹豫不决\"的状态。整块磁铁会自发分裂成**上磁畴**和**下磁畴**，两个方向的\"铁磁岛屿\"相互竞争。外部稍微一推，整个系统就滑向其中一种。**这是典型的双稳态。**\n\n这套数学后来被发现**不只适用于磁铁**。它适用于任何\"从众 + 噪音\"的系统：\n\n- 水结冰（温度低于 0 度就变成有序冰晶）\n- 液晶显示（电压控制有序态和无序态）\n- 舆论相变（观点从分散到极化）\n- **市场选择（某个技术从 niche 到 mainstream 的过程）**\n\n#### 为什么套用到 Tesla\n\n电动车市场的\"主流化\"，本质上就是一个**居里相变**：\n\n| Ising 模型 | EV 市场 |\n|---|---|\n| 小磁针的方向 | 每个消费者的购车选择（EV 或燃油） |\n| 邻居的影响 | 朋友/同事/邻居开什么车 |\n| 温度 $T$ | 整体经济环境 + 补贴 + 基础设施成熟度 |\n| 外部磁场 $b$ | 政府政策、碳税、油价、电池价格 |\n| 居里温度 $T_c$ | 让\"从众效应\"足以稳定 EV 为主流的临界条件 |\n\n2020-2022 年发生了什么？**外部条件（$b$）被政府推得非常高**——巨额补贴、碳税提议、油价飙升、电池成本快速下降。这相当于**给系统加了一个大的外场**，把整个 EV 系统推到\"上臂稳态\"（EV 主流）。\n\n这时 Tesla 的叙事完全成立。销量每年翻倍，基础设施（Supercharger）越建越密，正反馈在发动。\n\n**但 2023-2025 发生了反转**：\n\n1. **补贴退坡**：美国 IRA 补贴被质疑，欧洲多国削减补贴，中国退出直接补贴\n2. **油价回落**：2022 年油价尖峰后，2023-2025 年回到 70-80 美元/桶，燃油经济性重回可接受区间\n3. **电池成本下降放缓**：从 2020 年的每年降 18% 降到 2024 年的每年降 5%\n4. **充电网络扩张速度不及预期**：美国和欧洲多地电网容量成为瓶颈\n\n**这些合起来降低了外部磁场 $b$**。系统状态开始从\"上臂\"向\"共存区\"滑动。\n\n#### 量化结果\n\n用一个简化的 Landau-Ginzburg 势能函数表述 EV 市场状态：\n\n$$V(m) = -\\frac{1}{2} a m^2 + \\frac{1}{4} m^4 - b \\cdot m$$\n\n- $m$ 是 EV 在新车销量中的占比（0 到 1）\n- $a$ 反映正反馈强度（充电网络、二手车市场、用户熟悉度）\n- $b$ 是外部驱动力（补贴 + 油价 + 电池成本）\n- 势能的最小值就是系统的稳态\n\n对这个势能做标准的双稳态分析，可以算出**临界 $b_c$**——外部驱动力跌到多少以下，上臂稳态就在数学上消失。\n\n估计当前参数：\n\n| 参数 | 当前值 | 意味着什么 |\n|---|---|---|\n| $a$（正反馈强度）| **约 0.85** | 充电网络、二手车、熟悉度仍在积累 |\n| $b_c$（临界外场）| **约 0.105** | 保持 EV 主流稳态所需的最小外部驱动 |\n| 当前 $b$（实际外场）| **约 0.08** | **已跌破临界值** |\n| $m^*_{上臂}$ | — | **数学上不再是稳定解** |\n\n**判读**：EV 主流稳态在 2023-2024 年的某个时候已经数学上消失。系统现在处于**非平衡态**——它还长得\"像\"主流稳态，但这只是因为系统有**弛豫时间**（relaxation time），还没滑到新的平衡位置。\n\n弛豫时间有多长？基于消费者决策周期和车队周转率，大约 **3-5 年**。这意味着 2023 年跌破临界之后，2026-2028 年市场会**完成向新稳态的迁移**——一个 EV 占比 25-35% 而不是 60%+ 的稳态。\n\n#### 历史先例：磁铁突然失磁的公司\n\n**3D 打印（2012-2015）**：Stratasys、3D Systems 在 2012-2014 年经历了类似的居里相变。消费级 3D 打印机一度被视为\"新的个人电脑\"，正反馈在启动，股价疯涨 500%。然后外部条件变化（硬件复杂度高于预期，软件生态跟不上），系统跌破临界，**18 个月从 niche 主流化叙事崩回到工业小众应用**。Stratasys 市值从 80 亿跌到 10 亿。\n\n**氢燃料电池车（2014-2020）**：丰田 Mirai、本田 Clarity、现代 Nexo 一度被视为和 BEV 并行的路线。但氢能基础设施的正反馈强度 $a$ 太小，需要的外部驱动 $b$ 一直没到位。2020 年之后基本被证伪——**不是\"缓慢失败\"，是\"某一天发现整个行业不再讨论这件事\"**。\n\n**3D 电视（2010-2013）**：Sony、Samsung、LG 曾把 3D 电视定位为下一代主流。2011 年 3D 电视占高端电视销量 30%。外场 $b$ 主要来自内容和戴眼镜的新奇感。内容端跟不上之后，$b$ 跌破临界，**2013 年所有主要品牌退出 3D 电视线**，系统 24 个月内彻底回到 2D 稳态。\n\n**共同特征**：这些转型都在\"看起来很顺\"的时候发生相变回退。外部参数缓慢漂移到阈值，然后整个生态集体\"失磁\"。\n\n#### 这个模型什么时候会失效\n\n1. **新一轮外部驱动重启**：比如美国 carbon tax 真的立法，或者石油危机再来一次，$b$ 重新回到 $b_c$ 以上。系统可能重回上臂稳态。\n2. **正反馈强度 $a$ 独立增长**：二手 EV 市场突然成熟，充电网络普及度跨过某个 tipping point，让上臂稳态自持不再需要外部驱动。BYD 在中国正在展示这种可能。\n3. **新技术改写规则**：固态电池量产、L5 自动驾驶普及，让 EV 的价值函数发生质变。但这些是 5-10 年的事。\n\n---\n\n### 2.2 视角二：突变论——连续参数下的不连续跳变\n\n#### 这个理论讲什么\n\n1970 年代，法国数学家 René Thom 提出了一个数学框架叫**突变论（Catastrophe Theory）**。它研究一类特殊现象：**一个系统的外部参数缓慢改变，但系统状态会在某个时刻突然跳变**。\n\n最简单的例子是**尖点突变（cusp catastrophe）**，它有两个控制参数和一个状态变量，可以用一个标准势能形式描述：\n\n$$V(x; a, b) = \\frac{1}{4} x^4 - \\frac{1}{2} a x^2 - b x$$\n\n翻译：\n- $x$ 是系统状态\n- $a$ 和 $b$ 是两个外部控制参数\n- 稳态就是势能的最小值\n\n这个势能的形状很有意思：\n\n- 当 $a < 0$ 时：势能只有一个最小值 → **单稳态**\n- 当 $a > 0$ 时：势能可能有两个最小值 → **双稳态**\n\n在 $a > 0$ 的双稳态区域里，$b$ 决定系统处在哪一个稳态：\n\n- $b > 0$ 很大时：系统在\"上臂\"\n- $b < 0$ 很小时：系统在\"下臂\"\n- 中间的过渡区里，**两个稳态同时存在**，系统选哪一个取决于**历史**（从哪边来的）——这叫**滞后效应（hysteresis）**\n\n**最神奇的地方**：在 $b$ 穿过某个临界值 $b_c$ 的瞬间，如果系统原本在上臂，**整个上臂稳态会在数学上消失**，系统被迫瞬间跳到下臂。反过来也一样。\n\nThom 证明，**任何有两个控制参数的双稳态系统，都能被这个尖点突变曲面描述**。这让它成为一个通用工具：\n\n- 心脏病学：心脏从正常节律到纤颤的相变\n- 社会学：骚乱从\"不满\"到\"爆发\"的相变\n- 经济学：货币从稳定到崩盘的相变\n- **工业转型：某个技术从主流到边缘的相变**\n\n#### 为什么套用到 Tesla\n\nTesla 的\"EV 主流化\"故事完全对应一个 cusp catastrophe：\n\n| 尖点突变 | Tesla / EV 市场 |\n|---|---|\n| 控制参数 $a$（正反馈强度）| 充电网络密度 × 二手 EV 流动性 × 用户熟悉度 |\n| 控制参数 $b$（外场）| 油价 × 补贴 × 电池成本下降 × 碳税 |\n| 状态变量 $x$ | 新车销量里 EV 占比 |\n| 上臂稳态 | EV 主流（占比 50%+） |\n| 下臂稳态 | EV 高端 niche（占比 15-25%） |\n| 滞后效应 | 已经买了 EV 的用户不会立刻换回燃油（车队惯性）|\n\n**关键观察**：2022 年达到的 EV 销量份额曲线，是在\"$a$ 和 $b$ 都高\"的条件下实现的。2023 年之后：\n\n- $a$（正反馈强度）**基本没变**——充电网络仍在扩，二手市场仍在发展\n- **但 $b$（外场）显著下降**——补贴退坡 + 油价回落 + 电池降本放缓\n\n**结果是**：在 cusp 突变曲面上，Tesla 的位置从\"上臂中心\"滑向了\"上臂边缘\"，然后在某个时刻跨过了上臂稳态在数学上消失的边界。\n\n**现在 Tesla 还在上臂位置的原因**是 hysteresis 和弛豫时间：\n\n1. 已经买了 EV 的用户 **不会立刻抛售** 换燃油车（虽然二手 EV 残值恶化说明一些人正在考虑）\n2. 车企的 EV 投资**不能立刻撤回**——已经建的工厂还得用\n3. 消费者的决策习惯有滞后——朋友圈里谁开 EV 的记忆还很新鲜\n\n但滞后时间是有限的。基于产品更换周期和信息传播速度，Tesla 的弛豫时间**大约 3-5 年**。换句话说：\n\n**2023 年跌破临界 → 2026-2028 年完成到下臂稳态的迁移。**\n\n这不是\"Tesla 的基本面在恶化\"——这是**市场在完成一次相变**。Tesla 的价格、销量、毛利率的下降都是同一个现象的不同表现。\n\n#### 量化结果\n\n基于尖点突变曲面拟合 2018-2025 年全球 EV 销量占比数据：\n\n| 参数 | 值 | 解释 |\n|---|---|---|\n| $a$（正反馈强度）| 0.85 | 仍较强 |\n| $b_c$（临界外场）| **0.105** | 维持上臂的最小 $b$ |\n| $b_{2022}$ | 0.14 | 补贴 + 油价双高峰 |\n| $b_{2025}$ | **0.08** | **已显著跌破 $b_c$** |\n| 弛豫时间 $\\tau$ | **约 4 年** | 从跌破到新稳态的迁移时间 |\n\n**三种情境的 2028 年 EV 占比预测**：\n\n| 情境 | 全球新车 EV 占比 2028 | Tesla 全球销量 | 备注 |\n|---|---|---|---|\n| Bull（$b$ 回升到 $b_c$ 以上）| 50-55% | 250-300 万辆 | 需要油价 + 补贴同时回升 |\n| **Base（系统继续向下稳态迁移）** | **28-35%** | **130-160 万辆** | 当前趋势的自然延续 |\n| Bear（另一波逆风）| 20-25% | 90-120 万辆 | 电池供应链危机或进一步补贴退坡 |\n\nTesla 2024 年销量 180 万，2025 预计 170 万。**Base 情境里 2028 年销量低于 2024 年**——这不是\"失速\"，这是**相变的数学必然**。\n\n#### 历史先例\n\n**柯达胶片相机向数码的转型（1998-2005）**：一个经典的 cusp 突变。$a$ 是数码影像的正反馈（相机 + 打印机 + 存储），$b$ 是技术成本下降。2001 年越过临界，**但柯达 2005-2010 才真正感到冲击**——弛豫时间约 5 年，和我给 Tesla 估的数字完全一致。柯达 2012 破产。\n\n**BlackBerry 向智能手机的转型（2007-2012）**：iPhone 2007 发布，BlackBerry 2009 年销量峰值 5000 万，2013 年销量崩到 1500 万，2016 年基本退出。从\"跌破临界\"到\"进入下臂稳态\"**大约 4-5 年**。BlackBerry 股价从 2008 年的 150 跌到 2013 年的 7。\n\n**大众甲壳虫停产（1978-2003）**：德国大众的老甲壳虫到 1970 年代已经在相变曲面上滑向下臂，但因为墨西哥市场的保护，上臂的残余一直延续到 2003 年才完全停产。**弛豫时间 25 年**——但那是因为有地理隔离形成的局部保护。\n\n#### 这个模型什么时候会失效\n\n1. **如果政策再给一次大外场**：美国某个州出台激进禁燃油车政策，或者欧盟加速 2035 年目标到 2030 年——$b$ 突然回到 $b_c$ 以上。\n2. **如果 Tesla 实现独立的正反馈**：靠 FSD + 机器人 + Energy 的垂直整合形成产品级别的\"自循环\"，不再依赖整体 EV 市场相变。这是 Bull 情境的核心假设。\n3. **如果 BYD 和中国 EV 厂商能 single-handedly 把中国 EV 推过临界**：中国市场的独立 $b_c$ 相比全球更低（低油价替代品少、基础设施建设快），可能形成\"中国独立的上臂稳态\"，Tesla 在这个稳态里占小部分但稳定份额。\n\n---\n\n### 2.3 视角三：FSD 的 Allee 效应——种群密度的自持阈值\n\n#### 这个理论讲什么\n\n生态学家 W.C. Allee 在 1930 年代观察到一个现象：**某些物种的生存不只取决于有没有资源，还取决于同类的密度**。\n\n最有名的例子是**旅鸽**（passenger pigeon）。19 世纪初北美有 30 亿只旅鸽，是地球上最多的鸟。它们的繁殖方式依赖于群体：**只有当鸽群密度达到某个最低阈值，繁殖才能成功**（需要大量同时筑巢才能形成 predator swamping 保护，需要集体迁徙才能找到食物源）。\n\n19 世纪下半叶人类大量猎杀旅鸽，数量从 30 亿降到 100 万。**100 万只在任何生物学直觉下都是\"足够多\"**。但 Allee 告诉你——**如果 100 万低于自持阈值，这个物种已经数学上死了**，只是还没意识到。旅鸽 1914 年灭绝，最后一只死在辛辛那提动物园。\n\nAllee 效应的方程大致是：\n\n$$\\frac{dN}{dt} = r N \\left(\\frac{N}{A} - 1\\right)\\left(1 - \\frac{N}{K}\\right)$$\n\n翻译：\n- $N$ 是种群数量\n- $K$ 是承载量（传统的资源上限）\n- **$A$ 是 Allee 阈值**（自持的最低密度）\n- 关键：如果 $N < A$，$dN/dt < 0$——**种群会自发缩减直到灭绝**\n\n在 $A$ 和 $K$ 之间，种群是稳定的；**在 $A$ 以下，种群的\"死亡\"是数学必然**。时间**不是朋友，是敌人**——活一天少一天，没有\"慢慢恢复\"这种事，只有\"先回到阈值之上\"或\"灭绝\"。\n\n#### 为什么套用到 Tesla 的 FSD\n\nTesla 把 FSD（Full Self-Driving）定位为未来估值的核心——\"一个卖硬件的公司转型成一个卖自动驾驶服务的 AI 公司\"。市场把它当作一个 **time-value call option**：时间拖得越长，技术会越好，价值会越大。\n\n**这个论点在 Allee 框架下是错的。** FSD 不是时间价值 option，是一个**需要密度阈值**的自持系统。\n\n为什么？FSD 的商业模式依赖以下几个要素：\n\n1. **数据飞轮**：活跃用户越多，边缘场景覆盖越全，模型进步越快\n2. **Monetization**：订阅费收入必须覆盖云端训练成本 + 地图维护 + 客服\n3. **监管信任**：事故统计需要大分母才能有说服力\n4. **保险定价**：需要足够多的数据点才能算出精算费率\n5. **法律先例**：L3+ 责任认定需要足够多的案例才能稳定\n\n这些**都是密度敏感的**。在用户数低于某个阈值 $A$ 的时候，每一个都不能自持：\n\n- 数据飞轮转不动（边缘场景见不到）\n- Monetization 入不敷出\n- 事故统计缺说服力\n- 保险公司拒保或加价\n- 法律先例不够形成行业标准\n\n#### 量化结果\n\n估计 FSD 的 Allee 阈值：\n\n| 项 | 估计值 | 依据 |\n|---|---|---|\n| Waymo 当前自持规模 | 约 80 万活跃车·月 | Waymo 2025 年数据 |\n| FSD 覆盖城市数需求 | > 50 个主要都市 | 监管 + 精算需求 |\n| 数据飞轮启动所需车数 | 约 200 万 | AI 行业经验比照 |\n| 法律责任统计所需 | 约 100 万车·年 | 保险精算经验 |\n| **估计 FSD Allee 阈值 $A$** | **约 300 万活跃车** | 以上要素联合约束 |\n| **当前 FSD 活跃订阅数** | **约 60 万** | Tesla 披露 |\n| 距离阈值的差距 | **约 240 万** | 需要 5 倍于当前规模 |\n\n**关键判读**：Tesla 的 FSD 活跃规模离自持阈值**差一个数量级**（precisely: 5×），而且**差距在 2024-2025 不是在缩小，是在扩大**：\n\n- 2023 年 FSD 活跃订阅 50 万\n- 2024 年约 55 万\n- 2025 年约 60 万（增速放缓）\n\n与此同时：\n\n- Waymo 的活跃车·月数从 2023 年的 10 万涨到 2025 年的 80 万（5 年增速 8×）\n- 中国百度 Apollo、小马智行等 robotaxi 在中国多个主要城市运营\n- 这些竞争者在**自己的阈值之上运行**，飞轮已经在转\n\n**时间不是朋友。** 每过一年，FSD 距离 Allee 阈值的差距**相对竞争对手**在扩大。这不是\"FSD 在变好\"，这是\"同类物种的数量在自持阈值之上增长\"——而 FSD 被困在阈值之下。\n\n#### 历史先例：死在阈值下的物种\n\n**Palm WebOS（2009-2011）**：一个技术上很有亮点的移动操作系统，但在 iOS 和 Android 已经越过 Allee 阈值（应用生态、开发者社区、用户基数）的时候启动。WebOS 活跃设备数从未超过 500 万，远低于自持阈值。**HP 2010 年收购后 18 个月就放弃了产品线**。\n\n**Windows Phone（2010-2017）**：微软的智能手机操作系统。市场份额峰值 3.5%，绝对数 5000 万设备。看起来不少，**但远低于移动操作系统的 Allee 阈值**（需要开发者、应用生态、用户社群同步达到某个规模）。时间不是 Windows Phone 的朋友，2017 年微软正式停止更新。\n\n**HTC Vive / Oculus 消费级 VR（2016-2019）**：VR 硬件年出货量从未超过 600 万台，远低于\"让主流开发者愿意开发 VR 应用\"的阈值。飞轮从未启动，内容生态饥饿，用户流失。典型的\"先有 N 还是先有应用\"的 Allee 陷阱。\n\n#### 这个模型什么时候会失效\n\n1. **FSD 技术突破带来突然的用户激增**：如果 V14 或 V15 实现 L3 监管审批，订阅数可能 12 个月内 2-3×。但需要跨过 5× 的差距，仍然不够。\n2. **Tesla 把 FSD 免费开放给所有车主形成数据飞轮**：用装机量（全球 Tesla 约 800 万辆）代替付费用户作为数据源。这能跨过数据部分的阈值，但 monetization 部分还是不自持。\n3. **法规强制 L3+ 采用**：某些国家或州强制要求新车配备 L3+ 辅助驾驶，Tesla 作为唯一现成方案享受强制市场。这是\"外部干预\"突破 Allee 的唯一路径。\n\n---\n\n## 三、量化预测总表\n\n### 三情境 2028 年预测\n\n| 情境 | 概率 | 全球销量 | 毛利率 | 市值 | 核心逻辑 |\n|---|---|---|---|---|---|\n| **Bull** | 15% | 250-300 万 | 22-25% | 1.2-1.5T | cusp $b$ 回升 + FSD 破 Allee 阈值 |\n| **Base**（弛豫下滑）| 60% | 130-160 万 | 14-17% | **0.25-0.38T** | 当前趋势延续，车辆业务下滑 |\n| **Bear** | 25% | 90-120 万 | 8-12% | 0.15-0.22T | 再一次外场恶化 + FSD 失败 |\n\n### 对比市场共识\n\n| 指标 | 市场共识 2028 | 本报告预测 | 差距 |\n|---|---|---|---|\n| 全球销量 | 280 万 | 150 万（base）| **-46%** |\n| 毛利率 | 22% | 16% | **-600 bp** |\n| 市值 | 1.0T | 0.35T（base）| **-65%** |\n| Bull 情境隐含概率 | 约 50% | 15% | **-35 pp** |\n\n**核心认知差**：市场把 Tesla 当 Bull 情境定价。我的结构分析说 Bull 只是 15% 概率的尾部情境，Base 是 60% 概率的中位情境——**而这两个情境相差 3×**。\n\n---\n\n## 四、市场在犯的三个结构性错误\n\n### 错误 1：把 EV 转型当作\"时间问题\"而非\"相变问题\"\n\n**市场叙事**：EV 最终会取代燃油车，只是时间问题。短期下滑是 bump，不是 trend。\n\n**结构漏洞**：这假设系统只有一个稳态（EV 主流），下滑是偶然波动。**但数学上 EV 市场有两个稳态**，外部参数决定哪个稳定。2023 年后外场 $b$ 跌破临界 $b_c$，上臂稳态在数学上不再是稳定解。Tesla 现在的\"缓慢下滑\"不是波动，是向下稳态的弛豫过程。时间不会自动把系统推回上臂——需要外部参数重新跨越临界。\n\n### 错误 2：把 FSD 当作时间价值 call option\n\n**市场叙事**：FSD 迟早会成功，技术进步是指数的，只要 Tesla 还活着 FSD 就值钱。\n\n**结构漏洞**：这假设 FSD 有\"自由的发育时间\"。**但 FSD 是一个需要密度阈值的 Allee 系统**。每过一年，Tesla 距离阈值 300 万的差距相对 Waymo、百度 Apollo 在扩大，不是在缩小。时间不是盟友是敌人——这正是 Allee 效应的定义。如果 Tesla 不能在 24 个月内显著接近 Allee 阈值，FSD 的商业价值是**数学上趋零**的，不是\"慢慢变小\"。\n\n### 错误 3：把毛利率下滑当作\"价格战的临时现象\"\n\n**市场叙事**：毛利率从 30% 降到 18% 是因为降价促销，价格战结束后会反弹。\n\n**结构漏洞**：毛利率下滑是**双稳态转移的必然财务表现**。当系统从上臂稳态向下臂稳态迁移时，市场定价权从\"新兴技术溢价\"向\"成熟商品化\"切换。这不是\"价格战\"可以解释的——这是整个市场的支付意愿曲线在向下移动。价格战结束后毛利率不会反弹，会稳定在 15-18% 的新稳态水平。**18% 不是临时的，是 Tesla 新稳态的真实边际**。\n\n---\n\n## 五、你应该监控的 10 个指标\n\n| 类别 | 指标 | 阈值 | 触发意味着什么 |\n|---|---|---|---|\n| **外场 $b$** | 美国 EV 补贴（IRA）动向 | 削减或废除 | $b$ 进一步下降，向 Bear 迁移 |\n| **外场 $b$** | 全球油价 | < 60 美元/桶持续 | EV 经济优势消失 |\n| **外场 $b$** | 电池 pack 成本（美元/kWh） | 同比降幅 < 4% | 成本下降动力减弱 |\n| **正反馈 $a$** | Supercharger 全球新装数 | 同比下滑 | 充电网络扩张减速 |\n| **车辆业务** | Tesla 全球季度交付量 | 同比 < -5% | 弛豫进程加速 |\n| **车辆业务** | 毛利率（不含 reg credit）| 持续 < 16% | 定价权被商品化吃掉 |\n| **FSD Allee** | FSD 付费订阅总数 | 年增 < 30% | 距阈值的差距在扩大 |\n| **FSD Allee** | Tesla 在全 AV 场景数据飞轮份额 | 持续下降 | Waymo / 百度在领跑 |\n| **Energy** | 储能业务季度营收 | 加速 > 40% YoY | 第二曲线有希望 |\n| **竞争** | BYD + 中国 EV 在欧洲份额 | > 20% | 相变稳态不利于 Tesla |\n\n**使用原则**：\n- **外场类** 任两个触发 → 相变速度加快，立即重估 base case\n- **车辆业务类** 任一触发 → 弛豫曲线比预期陡峭\n- **FSD Allee 类** 两个都触发 → FSD option value 归零\n- **Energy 触发** → 仅此一项不够改变 base case 判断，需要量化到能抵消车辆业务的下滑幅度\n\n---\n\n## 六、一句话总结\n\n**Tesla 是一块已经跌破居里温度的磁铁，还有磁性是因为热弛豫还没完成。市场把弛豫过程当作\"底部即将反弹\"——但数学上它要去的稳态是下面那个，不是上面那个。FSD 不是救命稻草，是一个被困在 Allee 阈值下面 5 倍的物种。时间不是朋友，是敌人。**\n\n---\n\n## 免责声明\n\n本报告基于公开数据的结构化分析，**不构成任何投资建议**。所有数字都是数学模型的投影，不是预测。任何投资决策应由你自己做出，并咨询合格的金融顾问。\n\n## 方法说明\n\n报告由 **Phase Detector** 生成。核心引擎把公司抽象成\"动力学系统\"（状态变量 + 反馈 + 边界），然后在物理学、数学、生态学的经典模型库里检索结构等价的现象。\n\n本次报告引用的三个理论：\n\n- **Ising 模型的居里相变**（Ising 1925；Onsager 二维精确解 1944）—— 铁磁系统的有序-无序相变\n- **尖点突变理论 cusp catastrophe**（René Thom, 1972；Zeeman 应用扩展 1974）—— 双稳态系统的不连续相变\n- **Allee 效应**（W.C. Allee, 1931；Stephens & Sutherland 量化框架 1999）—— 种群生物学的自持密度阈值\n";
