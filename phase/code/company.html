<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAFAF9">
  <title>加载中… — Phase Detector</title>
  <meta name="description" content="单家公司的结构化分析：动力学家族、相位阶段、反馈拓扑、临界点、核心方程。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <style>
    :root {
      --bg: #FAFAF9;
      --bg-elevated: #FFFFFF;
      --bg-card: #F4F4F5;
      --border: #E4E4E7;
      --border-strong: #D4D4D8;
      --text: #18181B;
      --text-secondary: #52525B;
      --text-muted: #71717A;
      --text-dim: #A1A1AA;
      --accent: #2563EB;
      --accent-dim: rgba(37, 99, 235, 0.08);
      --green: #059669;
      --amber: #D97706;
      --red: #DC2626;
      --mono: 'JetBrains Mono', 'Menlo', monospace;
      --serif: 'Noto Serif SC', 'Times New Roman', serif;
      --sans: 'Inter', -apple-system, system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header.site {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky; top: 0;
      background: rgba(250, 250, 249, 0.88);
      backdrop-filter: saturate(180%) blur(12px);
      z-index: 100;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .nav { display: flex; justify-content: space-between; align-items: center; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: var(--text); }
    .brand-mark { width: 20px; height: 20px; border: 1.5px solid var(--accent); border-radius: 50%; position: relative; }
    .brand-mark::before { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--accent); }
    .brand-beta { font-size: 10px; padding: 2px 6px; background: var(--accent-dim); color: var(--accent); border-radius: 3px; font-weight: 600; }
    nav.menu a { margin-left: 20px; font-size: 14px; color: var(--text-muted); }
    nav.menu a:hover { color: var(--text); text-decoration: none; }

    main { padding: 40px 0 80px; }

    .breadcrumb { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .breadcrumb a { color: var(--text-muted); }

    .ticker-eyebrow {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    h1.company-name {
      font-family: var(--serif);
      font-size: clamp(32px, 4vw, 44px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .meta-chip {
      padding: 4px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .phase-banner {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 32px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      border-width: 1px;
      border-style: solid;
    }
    .phase-dot { width: 8px; height: 8px; border-radius: 50%; }
    .phase-stable { background: rgba(5, 150, 105, 0.08); color: var(--green); border-color: rgba(5, 150, 105, 0.28); }
    .phase-stable .phase-dot { background: var(--green); }
    .phase-saturated { background: rgba(113, 113, 122, 0.08); color: var(--text-muted); border-color: var(--border-strong); }
    .phase-saturated .phase-dot { background: var(--text-muted); }
    .phase-growth_phase { background: var(--accent-dim); color: var(--accent); border-color: rgba(37, 99, 235, 0.28); }
    .phase-growth_phase .phase-dot { background: var(--accent); }
    .phase-approaching_critical { background: rgba(217, 119, 6, 0.08); color: var(--amber); border-color: rgba(217, 119, 6, 0.3); }
    .phase-approaching_critical .phase-dot { background: var(--amber); }
    .phase-post_transition, .phase-unstable, .phase-contracting { background: rgba(220, 38, 38, 0.06); color: var(--red); border-color: rgba(220, 38, 38, 0.28); }
    .phase-post_transition .phase-dot, .phase-unstable .phase-dot, .phase-contracting .phase-dot { background: var(--red); }

    section.block {
      margin-bottom: 40px;
      padding: 28px 32px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    section.block h2 {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }
    section.block h2 .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 1.5px;
      margin-left: 12px;
      text-transform: uppercase;
    }
    section.block p { color: var(--text-secondary); margin-bottom: 12px; line-height: 1.75; }

    .key-value {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px 24px;
      font-size: 14px;
    }
    .key-value dt { color: var(--text-dim); font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; padding-top: 4px; }
    .key-value dd { color: var(--text); }

    .equation-box {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 14.5px;
      overflow-x: auto;
      color: var(--text);
      margin: 8px 0 16px;
    }
    .equation-box .katex,
    .deep-report-md .katex { color: var(--text); font-size: 1.05em; }
    @media (max-width: 520px) {
      .equation-box { font-size: 12.5px; padding: 14px 14px; }
      .equation-box .katex { font-size: 0.95em; }
    }

    .critical-list {
      list-style: none;
      padding: 0;
    }
    .critical-list li {
      padding: 10px 14px;
      margin-bottom: 8px;
      background: var(--bg-card);
      border-left: 2px solid var(--amber);
      border-radius: 0 6px 6px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .param-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .param-table th, .param-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .param-table th { color: var(--text-dim); font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 400; }

    .confidence-bar {
      height: 4px;
      background: var(--bg-card);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .confidence-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    .cta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: var(--accent); color: #FFFFFF; }
    .btn-primary:hover { background: #1D4ED8; text-decoration: none; }
    .btn-secondary { background: transparent; color: var(--text); border-color: var(--border-strong); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .btn-ghost { background: transparent; color: var(--text-muted); border-color: transparent; padding: 12px 14px; }
    .btn-ghost:hover { color: var(--text); text-decoration: none; }
    .cta-row { align-items: center; justify-content: space-between; }
    .btn-next { flex: 1; justify-content: center; max-width: 560px; }

    .related-samples {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .related-sample {
      display: block;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.15s;
      color: var(--text);
      text-decoration: none;
    }
    .related-sample:hover {
      border-color: var(--accent);
      background: var(--bg-card);
      text-decoration: none;
      transform: translateY(-1px);
    }
    .related-sample-tk {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .related-sample-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .related-sample-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    .loading-dots {
      display: inline-flex;
      gap: 6px;
      margin-right: 8px;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.4;
      animation: dot-pulse 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
      30% { opacity: 1; transform: scale(1.1); }
    }
    .dr-progress {
      padding: 18px 22px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      display: flex;
      align-items: center;
    }
    .dr-progress .elapsed {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .deep-report-md {
      padding: 20px 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.85;
      margin-bottom: 16px;
    }
    .deep-report-md h1, .deep-report-md h2, .deep-report-md h3 {
      font-family: var(--serif);
      color: var(--text);
      margin: 20px 0 10px;
      line-height: 1.3;
    }
    .deep-report-md h1 { font-size: 22px; }
    .deep-report-md h2 { font-size: 18px; }
    .deep-report-md h3 { font-size: 15px; }
    .deep-report-md p { margin: 10px 0; }
    .deep-report-md ul, .deep-report-md ol { margin: 10px 0 10px 24px; }
    .deep-report-md li { margin: 4px 0; }
    .deep-report-md strong { color: var(--text); }
    .deep-report-md code { font-family: var(--mono); font-size: 12.5px; padding: 2px 6px; background: var(--bg-card); border-radius: 3px; }
    .deep-report-md blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 16px;
      margin: 12px 0;
      color: var(--text-muted);
    }

    .loading, .error {
      padding: 80px 0;
      text-align: center;
      color: var(--text-muted);
    }

    footer.site { padding: 40px 0; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }
    .footer-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    .footer-links a { color: var(--text-muted); margin-left: 16px; }

    @media (max-width: 720px) {
      .key-value { grid-template-columns: 1fr; gap: 4px 0; }
      .key-value dd { margin-bottom: 10px; }
    }
  </style>
</head>
<body>
  <header class="site">
    <div class="container nav">
      <a href="/phase" class="brand">
        <span class="brand-mark"></span>

      <nav class="menu">

      </div>

  </footer>

  <script>
    const DYNAMICS_LABELS = {

      'Stochastic_process': '随机过程',
      'Random_walk': '随机游走',
      'Unknown': '未分类',
    };
    const DYNAMICS_EXPLAIN = {
      'ODE1_exponential_growth': '公司处于纯指数增长阶段，远未看到饱和信号。典型场景：新兴技术早期爆发、网络效应尚未饱和。',
      'ODE1_logistic': '公司在 S 型增长曲线上，接近承载量上限。典型场景：成熟 SaaS、消费品渗透到大部分目标市场。',
      'ODE1_saturating': '公司已进入 S 型曲线后段，增长主要靠 ARPU 提升而非新增用户。',

      'Bistable_switch': '系统有两个稳定态，当前在两者之间的 cusp 附近。一次冲击可能让它跳到另一个稳态且不可逆。',
      'Fold_bifurcation': '老稳态正在消失，系统被迫跳到新稳态且不可回归。典型场景：专利悬崖、监管悬崖。',
      'Phase_transition_1st': '越过某个临界参数后，系统从一个稳态瞬间跳到另一个。像水结冰，没有"半液态"。',
      'Phase_transition_2nd': '连续相变，临界点附近对外部冲击的反应被无穷放大（susceptibility 发散）。',
      'Hysteresis_loop': '系统有记忆——上涨和下跌走不同路径。典型：品牌信任崩塌快、重建慢。',
      'Network_cascade': '级联传播。一个节点变化触发邻居变化，可以是病毒、挤兑、或破产链。',
      'Self_fulfilling_prophecy': '反身性循环：预期本身驱动结果，结果又强化预期。典型：资产泡沫、银行挤兑。',
      'DDE_delayed_feedback': '作用和结果有时间滞后。现在看起来稳定但未来已经注定。',
      'Game_theoretic_equilibrium': '多方策略均衡维持的脆弱稳态。任一方改变策略就打破平衡。',
      'Percolation_network': '网络临界密度。过了阈值网络连通（赢者通吃），没过阈值断裂。',
      'Hopf_bifurcation': '稳态失稳后变成周期性振荡。不是崩塌，是进入振荡。',
      'PDE_reaction_diffusion': '空间扩散结构主导。比如跨区域蔓延、地理扩张受物流速度约束。',
      'Power_law_distribution': '结果分布呈幂律，少数极端值主导总回报。',
      'Heavy_tail_extremal': '尾部风险主导，平均值 / 方差可能都不存在。黑天鹅主导。',
      'ODE2_damped_oscillation': '周期性波动，振幅逐渐减小。',
      'ODE2_undamped_oscillation': '持续周期性波动，无衰减。',
      'Markov_chain': '离散状态转移链。用户/客户在多个状态间转移，由转移矩阵决定。',
    };

    const PHASE_LABELS = {
      'growth_phase': '成长期',
      'stable': '稳定',
      'saturated': '饱和',
      'approaching_critical': '接近临界点',
      'post_transition': '相变后',
      'unstable': '失稳',
      'contracting': '收缩',
    };
    const PHASE_EXPLAIN = {
      'growth_phase': '这家公司仍在结构性增长曲线的早期，还远没到饱和。',
      'stable': '系统处于稳定均衡，没有明显的相变倾向。',
      'saturated': '已进入 S 曲线后段，增长空间被承载量约束。',

    };

    const FEEDBACK_LABELS = {
      'positive_loop': '正反馈循环',
      'negative_loop': '负反馈循环',
      'delayed_positive': '延迟正反馈',
      'delayed_negative': '延迟负反馈',
      'bistable': '双稳态',
      'multistable': '多稳态',
      'none': '无明显反馈',
      'unknown': '不确定',
    };

    const BOUNDARY_LABELS = {
      'runaway': '失控发散',
      'saturation': '趋向饱和',
      'limit_cycle': '极限环',
      'fixed_point': '固定点',
      'decay_to_zero': '衰减到零',
      'fold_bifurcation': '鞍结分岔',
      'hopf_bifurcation': 'Hopf 分岔',
      'phase_transition': '相变',
      'power_law_tail': '幂律尾',
      'unknown': '不确定',
    };

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function getTickerFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('t') || '';
    }

    let SAMPLES_MANIFEST = [];

    async function loadCompany() {
      const ticker = getTickerFromUrl();
      if (!ticker) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            <p>没有指定 ticker。</p>
            <p style="margin-top:20px"><a href="/phase/screener" class="btn btn-primary">回到筛选器</a></p>
          </div>`;
        return;
      }

      try {
        const [resp, mResp] = await Promise.all([
          fetch('/phase/api/companies'),
          fetch('/phase/data/samples_manifest.json').catch(() => null),
        ]);
        const data = await resp.json();
        if (mResp && mResp.ok) {
          try { SAMPLES_MANIFEST = await mResp.json(); } catch (e) { SAMPLES_MANIFEST = []; }
        }
        const company = (data.companies || []).find(c => c.ticker === ticker);
        if (!company) {
          document.getElementById('content').innerHTML = `
            <div class="error">
              <p>没有找到 ticker <strong>${escapeHtml(ticker)}</strong> 的预计算数据。</p>
              <p style="margin-top:20px">当前预计算了 ${data.count || 0} 家公司。</p>
              <p style="margin-top:20px"><a href="/phase/screener" class="btn btn-primary">回到筛选器</a></p>
            </div>`;
          return;
        }
        render(company);
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="error">加载失败：${escapeHtml(err.message)}</div>`;
      }
    }

    function relatedSamples(c) {
      if (!Array.isArray(SAMPLES_MANIFEST) || !SAMPLES_MANIFEST.length) return [];
      return SAMPLES_MANIFEST.filter(s =>
        s.dynamics_family === c.dynamics_family && s.ticker !== c.ticker
      );
    }

    function render(c) {
      document.title = `${c.name} (${c.ticker}) · Phase Detector`;

      const dynLabel = DYNAMICS_LABELS[c.dynamics_family] || c.dynamics_family;
      const dynExplain = DYNAMICS_EXPLAIN[c.dynamics_family] || '';
      const phaseLabel = PHASE_LABELS[c.phase_state] || c.phase_state;
      const phaseExplain = PHASE_EXPLAIN[c.phase_state] || '';
      const feedbackLabel = FEEDBACK_LABELS[c.feedback_topology] || c.feedback_topology;
      const boundaryLabel = BOUNDARY_LABELS[c.boundary_behavior] || c.boundary_behavior;
      const mcap = c.market_cap_usd ? '$' + (c.market_cap_usd / 1e9).toFixed(0) + ' B' : '-';
      const confPct = Math.round((c.confidence || 0) * 100);

      let timescaleText = '未知';
      if (typeof c.timescale_log10_s === 'number') {
        const days = Math.pow(10, c.timescale_log10_s) / 86400;
        if (days < 1) timescaleText = '分钟~小时';
        else if (days < 30) timescaleText = '日~周';
        else if (days < 365) timescaleText = '月';
        else if (days < 365 * 5) timescaleText = '年';
        else if (days < 365 * 15) timescaleText = '数年到十年';
        else timescaleText = '十年~数十年';
        timescaleText += ` (log₁₀s = ${c.timescale_log10_s})`;
      }

      const criticalList = Array.isArray(c.critical_points) && c.critical_points.length
        ? '<ul class="critical-list">' + c.critical_points.map(p => `<li>${escapeHtml(p)}</li>`).join('') + '</ul>'
        : '<p style="color: var(--text-dim); font-size: 13px;">暂无明确临界点数据</p>';

      let paramTable = '';
      if (Array.isArray(c.key_parameters) && c.key_parameters.length) {
        paramTable = '<table class="param-table"><thead><tr><th>符号</th><th>含义</th><th>估计值</th></tr></thead><tbody>' +
          c.key_parameters.map(p => `<tr><td><code>${escapeHtml(p.symbol || '')}</code></td><td>${escapeHtml(p.meaning || '')}</td><td>${escapeHtml(p.estimate || '-')}</td></tr>`).join('') +
          '</tbody></table>';
      }

      document.getElementById('content').innerHTML = `
        <div class="breadcrumb">
          <a href="/phase">Phase Detector</a> / <a href="/phase/screener">结构筛选器</a> / ${escapeHtml(c.ticker)}
        </div>

        <div class="ticker-eyebrow">${escapeHtml(c.ticker)} · ${escapeHtml(c.industry || '')}</div>
        <h1 class="company-name">${escapeHtml(c.name)}</h1>

        <div class="meta-row">
          <span class="meta-chip">${escapeHtml(c.exchange || '')}</span>
          <span class="meta-chip">市值 ${mcap}</span>
          <span class="meta-chip">${escapeHtml(c.country || '')}</span>
          <span class="meta-chip">置信度 ${confPct}%</span>
        </div>

        <div class="phase-banner phase-${c.phase_state || 'stable'}">
          <span class="phase-dot"></span>
          当前相位：${escapeHtml(phaseLabel)}
        </div>

        <section class="block">
          <h2>结构动力学 <span class="label">DYNAMICS FAMILY</span></h2>
          <p><strong style="font-size:18px; color: var(--text);">${escapeHtml(dynLabel)}</strong></p>
          ${dynExplain ? `<p style="color: var(--text-muted); font-size: 14px; margin-top: 8px;">${escapeHtml(dynExplain)}</p>` : ''}

          ${c.why_this_family ? `
            <p style="margin-top: 16px; padding: 14px 18px; background: var(--bg); border-left: 2px solid var(--accent); border-radius: 0 6px 6px 0;">
              <strong style="display: block; font-size: 11px; color: var(--accent); font-family: var(--mono); letter-spacing: 1px; margin-bottom: 6px;">为什么是这个家族</strong>
              <span style="color: var(--text-secondary); font-size: 14px;">${escapeHtml(c.why_this_family)}</span>
            </p>
          ` : ''}

          ${c.canonical_equation ? `
            <p style="margin-top: 16px; font-size: 12px; color: var(--text-dim); font-family: var(--mono); letter-spacing: 0.5px; text-transform: uppercase;">核心方程</p>
            <div class="equation-box">$$${escapeHtml(c.canonical_equation)}$$</div>
          ` : ''}
        </section>

        <section class="block">
          <h2>当前状态 <span class="label">PHASE STATE</span></h2>
          <p><strong style="color: var(--text);">${escapeHtml(phaseLabel)}</strong></p>
          ${phaseExplain ? `<p style="color: var(--text-muted); margin-top: 6px;">${escapeHtml(phaseExplain)}</p>` : ''}
          ${c.note ? `
            <p style="margin-top: 16px; padding: 14px 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 14px;">
              ${escapeHtml(c.note)}
            </p>
          ` : ''}
        </section>

        <section class="block">
          <h2>临界点与监控信号 <span class="label">CRITICAL POINTS</span></h2>
          ${criticalList}
        </section>

        ${paramTable ? `
          <section class="block">
            <h2>关键参数 <span class="label">PARAMETERS</span></h2>
            ${paramTable}
          </section>
        ` : ''}

        <section class="block">
          <h2>结构指标总览 <span class="label">STRUCTURE</span></h2>
          <dl class="key-value">
            <dt>dynamics family</dt><dd>${escapeHtml(c.dynamics_family || '-')}</dd>
            <dt>feedback topology</dt><dd>${escapeHtml(feedbackLabel || '-')}</dd>
            <dt>boundary behavior</dt><dd>${escapeHtml(boundaryLabel || '-')}</dd>
            <dt>timescale</dt><dd>${escapeHtml(timescaleText)}</dd>
            <dt>phase state</dt><dd>${escapeHtml(phaseLabel || '-')}</dd>
            <dt>confidence</dt>
            <dd>
              ${confPct}%
              <div class="confidence-bar"><div class="confidence-fill" style="width: ${confPct}%"></div></div>
            </dd>
          </dl>
        </section>

        ${(() => {
          const rel = relatedSamples(c);
          if (!rel.length) return '';
          const items = rel.map(s => `
            <a href="/phase/samples/${s.slug}.html" class="related-sample">
              <div class="related-sample-tk">${escapeHtml(s.ticker)}</div>
              <div class="related-sample-title">${escapeHtml(s.title)}</div>
              <div class="related-sample-meta">${escapeHtml(DYNAMICS_LABELS[s.dynamics_family] || s.dynamics_family)}</div>
            </a>
          `).join('');
          return `
            <section class="block">
              <h2>类似结构的深度样例 <span class="label">SAME DYNAMICS</span></h2>
              <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 16px;">
                这些公司被分类到同一个动力学家族（<strong>${escapeHtml(DYNAMICS_LABELS[c.dynamics_family] || c.dynamics_family)}</strong>），
                它们的结构动力学和这家公司在数学层面是同构的。看其中一份完整报告，相当于看了这家公司的 80%。
              </p>
              <div class="related-samples">${items}</div>
            </section>
          `;
        })()}

        <section class="block" id="deep-report-block">
          <h2>深度结构报告 <span class="label">DEEP REPORT</span></h2>
          <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 16px;">
            点下面的按钮，让 Claude Sonnet 4.5 基于这家公司的结构动力学，实时生成一份完整的中文深度报告（约 1500 字，30 秒生成）。
          </p>
          <div id="deep-report-content"></div>
          <button id="deep-report-btn" class="btn btn-primary" style="margin-top: 8px;">
            生成深度报告 →
          </button>
        </section>

        <div class="cta-row" style="gap: 10px; flex-wrap: wrap;">
          <a href="/phase/screener" class="btn btn-ghost">← 回到筛选器</a>
          <a href="/phase/timeline?t=${encodeURIComponent(c.ticker)}" class="btn btn-secondary">📜 相位演变</a>
          <a href="/phase/analogy?t=${encodeURIComponent(c.ticker)}" class="btn btn-secondary">🕰️ 历史类比</a>
          <a href="/phase/memo?t=${encodeURIComponent(c.ticker)}" class="btn btn-primary btn-next" style="flex: none;">📝 生成 Memo →</a>
        </div>
      `;

      const drBtn = document.getElementById('deep-report-btn');
      if (drBtn) {
        drBtn.addEventListener('click', () => generateDeepReport(c));
      }

      if (window.renderMathInElement) {
        renderMathInElement(document.getElementById('content'), {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
          ],
        });
      }
    }

    function renderMarkdown(md) {
      // Extract KaTeX math blocks first so they survive escaping and paragraph wrapping.
      const mathBlocks = [];
      const stash = (full) => {
        mathBlocks.push(full);
        return '\x00MATH' + (mathBlocks.length - 1) + '\x00';
      };
      md = md.replace(/\$\$[\s\S]+?\$\$/g, stash);
      md = md.replace(/\\\[[\s\S]+?\\\]/g, stash);
      md = md.replace(/(?<!\\)\$(?!\$)[^\n$]+?(?<!\\)\$(?!\$)/g, stash);
      md = md.replace(/\\\([\s\S]+?\\\)/g, stash);

      let html = escapeHtml(md);
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Lists
      html = html.replace(/(?:^[-*] .+(?:\n|$))+/gm, m => {
        const items = m.trim().split('\n').map(l => '<li>' + l.replace(/^[-*] /, '') + '</li>').join('');
        return '<ul>' + items + '</ul>';
      });
      html = html.replace(/(?:^\d+\. .+(?:\n|$))+/gm, m => {
        const items = m.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
        return '<ol>' + items + '</ol>';
      });
      // Paragraphs (split by blank lines, wrap non-block lines)
      const blocks = html.split(/\n{2,}/);
      html = blocks.map(b => {
        b = b.trim();
        if (!b) return '';
        if (/^<(h\d|ul|ol|blockquote)/.test(b)) return b;
        // A block that is only a display-math placeholder should not be wrapped in <p>
        if (/^\x00MATH\d+\x00$/.test(b)) return b;
        return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
      }).join('\n');

      // Restore math placeholders
      html = html.replace(/\x00MATH(\d+)\x00/g, (_, i) => mathBlocks[Number(i)]);
      return html;
    }

    async function generateDeepReport(c) {
      const btn = document.getElementById('deep-report-btn');
      const out = document.getElementById('deep-report-content');
      if (!btn || !out) return;
      btn.disabled = true;
      btn.textContent = '生成中…';
      btn.style.opacity = '0.6';
      const startTs = Date.now();
      out.innerHTML = `
        <div class="dr-progress">
          <span class="loading-dots"><span></span><span></span><span></span></span>
          <span>Claude Sonnet 4.5 正在分析这家公司的结构动力学…</span>
          <span class="elapsed" id="dr-elapsed">0s</span>
        </div>
      `;
      const drInterval = setInterval(() => {
        const el = document.getElementById('dr-elapsed');
        if (el) el.textContent = Math.round((Date.now() - startTs) / 1000) + 's';
      }, 500);
      try {
        const resp = await fetch('/phase/api/deep-report', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ticker: c.ticker, struct: c}),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({error: 'unknown'}));
          throw new Error(err.error || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        clearInterval(drInterval);
        out.innerHTML = '<div class="deep-report-md">' + renderMarkdown(data.report || '(empty)') + '</div>';
        btn.style.display = 'none';
        if (window.renderMathInElement) {
          renderMathInElement(out, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
            ],
          });
        }
      } catch (err) {
        clearInterval(drInterval);
        out.innerHTML = `<div style="padding: 16px; color: var(--red); font-size: 13px;">生成失败：${escapeHtml(err.message)}</div>`;
        btn.disabled = false;
        btn.textContent = '重试 →';
        btn.style.opacity = '1';
      }
    }

    document.addEventListener('DOMContentLoaded', loadCompany);
  </script>
  <script src="/assets/js/product-switcher.js?v=20260416a"></script>
