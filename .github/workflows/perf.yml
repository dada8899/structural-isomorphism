name: perf budget

# W13-B (2026-05-15) — performance budget gate.
#
# On every PR + push to main, this workflow:
#   1. Builds the phase-detector Next.js app with mock data.
#   2. Verifies First Load JS per route stays under perf-budget.json
#      (currently 200 kB).
#   3. Starts the production server and runs scripts/perf_audit.py
#      across 10 pages × 2 viewports, capturing LCP / CLS / TBT / INP*.
#   4. Verifies all numbers are under the perf-budget.json thresholds.
#   5. Posts a comment on the PR with the full metric table.
#
# Failing any check blocks merge. To intentionally relax a budget, edit
# perf-budget.json and explain the rationale in the PR description.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'web/phase-detector/**'
      - 'scripts/perf_audit.py'
      - 'scripts/perf_check_budget.py'
      - 'scripts/perf_check_bundle.py'
      - 'perf-budget.json'
      - '.github/workflows/perf.yml'

jobs:
  perf-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('web/phase-detector/pnpm-lock.yaml') }}

      - name: Install web deps
        working-directory: web/phase-detector
        run: pnpm install --frozen-lockfile

      - name: Build web (mock data)
        working-directory: web/phase-detector
        env:
          NEXT_PUBLIC_USE_MOCK: 'true'
        run: pnpm build 2>&1 | tee /tmp/build.log

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.59.0
          playwright install chromium

      - name: Check bundle budget
        run: |
          python scripts/perf_check_bundle.py \
            --build-log /tmp/build.log \
            --budget perf-budget.json \
            --markdown /tmp/bundle-report.md

      - name: Start production server
        working-directory: web/phase-detector
        env:
          NEXT_PUBLIC_USE_MOCK: 'true'
          PORT: '3017'
        run: |
          nohup pnpm start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          # Wait for server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3017/ > /dev/null; then
              echo "server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          cat /tmp/server.log
          exit 1

      - name: Run Core Web Vitals audit
        run: |
          mkdir -p docs/performance
          python scripts/perf_audit.py \
            --base http://localhost:3017 \
            --pages all \
            --viewport both \
            --out /tmp/perf-audit-ci.json

      - name: Check perf budget
        run: |
          python scripts/perf_check_budget.py \
            --audit /tmp/perf-audit-ci.json \
            --budget perf-budget.json \
            --markdown /tmp/perf-report.md

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-audit
          path: |
            /tmp/perf-audit-ci.json
            /tmp/perf-report.md
            /tmp/bundle-report.md
            /tmp/build.log

      - name: PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Performance audit\n\n';
            try {
              body += fs.readFileSync('/tmp/bundle-report.md', 'utf8') + '\n\n---\n\n';
            } catch (e) {}
            try {
              body += fs.readFileSync('/tmp/perf-report.md', 'utf8');
            } catch (e) {}
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith('## Performance audit'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
