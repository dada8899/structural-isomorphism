name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install numpy scipy pandas powerlaw pytest
      - name: Run sanity tests
        run: pytest v4/tests/sanity -m sanity -v
      - name: Run integration tests
        run: pytest v4/tests/integration -v || true

  package-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Test soc-pipeline package
        run: |
          cd packages/soc-pipeline
          pip install -e .[dev]
          pytest tests/ -v
      - name: Test guarded-llm package
        run: |
          cd packages/guarded-llm
          pip install -e .[dev]
          pytest tests/ -v
