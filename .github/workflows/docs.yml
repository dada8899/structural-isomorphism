name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history required by mkdocs-git-revision-date-localized-plugin
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mkdocs + plugins
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs==1.6.1 \
            mkdocs-material==9.7.6 \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-plugin

      - name: Build site (strict)
        run: mkdocs build --strict --site-dir _site_build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
