name: sanity tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas powerlaw matplotlib pytest pydantic
      - name: Run sanity tests
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/v4/lib:$(pwd)/web/backend"
          pytest v4/tests/sanity -m sanity -q --tb=short
