name: sanity tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas powerlaw matplotlib pytest pydantic pyyaml
      - name: Install local packages (editable)
        # v4/lib/{llm_guardrail,soc_pipeline}.py are deprecated shims that
        # re-export from packages/*. Sanity tests import via the shims
        # (and one test imports `yaml` directly), so we MUST install:
        #   * soc-pipeline       → fit_clauset_powerlaw + soc primitives
        #   * guarded-llm        → guarded_llm.guardrail symbols
        #   * cross-judge        → pulls in pyyaml + cross_judge prompts
        run: |
          pip install -e packages/soc-pipeline
          pip install -e packages/guarded-llm
          pip install -e packages/cross-judge
      - name: Run sanity tests
        # IMPORTANT: do NOT add v4/lib to PYTHONPATH. v4/lib/soc_pipeline.py
        # and v4/lib/llm_guardrail.py are deprecated re-export shims; when
        # v4/lib is on PYTHONPATH first, `from soc_pipeline import ...`
        # resolves to the shim, which re-imports itself and fails with
        # ImportError. The editable installs above provide the real
        # packages — let normal resolution find them. Tests that target the
        # shim itself (test_llm_guardrail.py) add v4/lib to sys.path locally.
        # web/backend is kept on PYTHONPATH for tests importing site-data modules.
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/web/backend"
          pytest v4/tests/sanity -m sanity -q --tb=short
