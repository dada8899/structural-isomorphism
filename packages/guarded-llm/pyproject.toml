[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "guarded-llm"
version = "0.1.0"
description = "Strict-JSON LLM caller with schema validation, retry, and cost budget"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.10"
authors = [{name = "dada8899", email = "dada8899@users.noreply.github.com"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = [
    "llm",
    "json",
    "schema",
    "guardrail",
    "validation",
    "retry",
    "budget",
    "anthropic",
    "openai",
    "deepseek",
    "kimi",
    "glm",
    "zhipu",
    "pydantic",
]
dependencies = [
    "pydantic>=2",
    "httpx>=0.27",
    "tenacity>=8",
    "jsonschema>=3.2",
    "requests>=2.28",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.30"]
openai = ["openai>=1.0"]
deepseek = ["openai>=1.0"]
kimi = ["openai>=1.0"]
glm = ["zhipuai>=2.0"]
all = [
    "anthropic>=0.30",
    "openai>=1.0",
    "zhipuai>=2.0",
]
dev = [
    "pytest>=7",
    "pytest-cov",
    "respx>=0.20",
    "ruff",
    "mypy",
    "build",
    "twine",
]

[project.urls]
Homepage = "https://github.com/dada8899/structural-isomorphism/tree/main/packages/guarded-llm"
Documentation = "https://github.com/dada8899/structural-isomorphism/tree/main/packages/guarded-llm/docs"
Repository = "https://github.com/dada8899/structural-isomorphism"
Issues = "https://github.com/dada8899/structural-isomorphism/issues"
Changelog = "https://github.com/dada8899/structural-isomorphism/blob/main/packages/guarded-llm/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/guarded_llm"]

[tool.hatch.build.targets.sdist]
include = [
    "src/guarded_llm",
    "tests",
    "examples",
    "docs",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]
