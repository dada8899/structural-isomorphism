[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "guarded-llm"
version = "0.1.0"
description = "Strict JSON LLM outputs with multi-provider support (Anthropic / OpenAI / DeepSeek / Kimi / Google)"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.10"
authors = [{name = "dada8899", email = "dada8899@users.noreply.github.com"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
keywords = ["llm", "json", "schema", "anthropic", "openai", "deepseek", "guardrail"]
dependencies = [
    "jsonschema>=4.0",
    "requests>=2.28",
    "pydantic>=2.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.30"]
openai = ["openai>=1.0"]
dev = ["pytest>=7", "pytest-cov", "ruff", "mypy"]

[project.urls]
Homepage = "https://github.com/dada8899/structural-isomorphism/tree/main/packages/guarded-llm"
Documentation = "https://github.com/dada8899/structural-isomorphism/tree/main/packages/guarded-llm/docs"
Repository = "https://github.com/dada8899/structural-isomorphism"
Issues = "https://github.com/dada8899/structural-isomorphism/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/guarded_llm"]
