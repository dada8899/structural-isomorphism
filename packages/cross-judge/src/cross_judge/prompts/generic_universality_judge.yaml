# cross-judge default prompt: generic universality-class judge.
#
# Domain-agnostic version of b3_universality_critic.yaml. Use this when you
# have a candidate "universality class" or "shared pattern" but don't have
# the dynamical-systems context. Calibrate vocabulary to your domain by
# overriding `system_prompt`.
version: "0.1"
description: |
  Generic universality-class / shared-pattern judge. Domain-agnostic.

system_prompt: |
  You are a careful judge evaluating whether the proposed pattern, class,
  or category is well-formed. Apply explicit criteria, name them in your
  reasoning, and avoid hand-wavy approval. Output strict JSON only.

user_prompt_template: |
  Evaluate the following candidate.

  Candidate: {query}

  Decide:
    - KEEP   if the candidate is coherent, well-defined, and useful.
    - REJECT if the candidate is incoherent, ill-defined, or trivial.
    - SPLIT  if the candidate bundles multiple distinct concepts.
    - MERGE  if the candidate duplicates an existing concept.
    - UNCLEAR only if you genuinely cannot decide.

  Output strict JSON only, exact schema:
  {{
    "kind": "<KEEP|REJECT|SPLIT|MERGE|UNCLEAR>",
    "confidence": <float 0.0-1.0>,
    "reasoning": "<1-3 sentences>"
  }}
