class_id: reaction_diffusion_steady_state_class
status: emerging
display_name: Steady-state reaction-diffusion gradient field
display_name_zh: 稳态反应-扩散梯度场
hub_phenomenon: Concentration / temperature gradients in 2D/3D space, generated by source-sink balance with diffusion; characteristic
  length λ = √(D/k)
shared_equation: 'Master PDE: ∂c/∂t = D·∇²c - k·c + S(x).

  Steady state: D·∇²c - k·c + S(x) = 0.

  Characteristic length: λ = √(D/k).

  2D radial point-source: u(r) ∝ -ln(r/λ) (logarithmic decay).

  3D radial: u(r) ∝ (1/r)·exp(-r/λ) (Yukawa form).

  Linear superposition (no Turing instability).

  '
key_invariants:
- 'PDE form: ∂c/∂t = D·∇²c - k·c + S(x)'
- Steady-state characteristic length λ = √(D/k)
- 2D radial logarithmic decay; 3D Yukawa decay
- Linear superposition (NO pattern formation; that's reaction_diffusion_turing)
- Source-sink balance at steady state
positive_examples:
- phenomenon: Urban heat island spatial gradient (城市热岛效应)
  evidence: 'Hub. Layer 4 prediction: λ ∈ [2.5, 6.0] km from Landsat 8/9 IR data on Shanghai. T(r)-T_∞ ∝ -ln(r/λ). D = turbulent
    diffusivity, k = radiative cooling rate.'
  verified_at: candidate
- phenomenon: Excavation groundwater drawdown cone (基坑降水的地下水漏斗)
  evidence: 'Theis equation: drawdown s(r) ∝ -ln(r) for steady radial flow. Same logarithmic decay.'
  verified_at: candidate
- phenomenon: Maternal effect gene egg-axis polarization (母源效应基因)
  evidence: Morphogen gradient ∂c/∂t = D∇²c - kc + source at one pole. Wolpert 1969 'French flag' model. Layer 3 high-confidence
    match.
  verified_at: candidate
- phenomenon: Heat conduction in finite slab with surface cooling
  evidence: Classic textbook reaction-diffusion. Same equation.
  verified_at: candidate
negative_examples:
- phenomenon: Turing patterns (Belousov-Zhabotinsky reactions)
  reason: Pattern formation requires non-linear reaction terms + diffusion instability (Turing condition D_v/D_u > critical).
    This class is LINEAR steady-state, no pattern. Belongs to reaction_diffusion_turing.
- phenomenon: Wave propagation (sound, light)
  reason: Wave equation ∂²u/∂t² = c²∇²u is second-order in time — not diffusion. Different class.
- phenomenon: Sandpile slope distribution
  reason: Granular dynamics with threshold cascades; SOC, not linear reaction-diffusion. Belongs to soc_threshold_cascade.
- phenomenon: Turbulent eddy diffusion (Kolmogorov)
  reason: Nonlinear (Navier-Stokes), no source-sink steady state; different mechanism.
- phenomenon: Turing pattern formation
  reason: "Produces regular spatial patterns (spots/stripes) via reaction-diffusion instability, not a monotonic gradient from a source-sink balance."
- phenomenon: Diffusion-limited aggregation (DLA)
  reason: Generates fractal clusters via random walker attachment; the Laplacian concentration field is transient and not a stationary gradient maintained by sources and sinks.
- phenomenon: Traveling front in Fisher–KPP equation
  reason: "Moving wavefront with steady shape, but the system is inherently transient and driven by reaction kinetics, not a static gradient field."
- phenomenon: Turbulent passive scalar mixing layer
  reason: "Scalar dissipation creates fluctuations, not a steady gradient; advection dominates and no fixed sources/sinks maintain a stationary field."
edge_cases:
- phenomenon: Magnetic dipole field
  debate: Same Laplace equation (∇²φ = 0 outside source) but no decay term k. Belongs to a sibling class 'Laplace equation
    steady-state'. Class boundary.
- phenomenon: Drug pharmacokinetics in tissue
  debate: Same equation with k = clearance rate. Belongs to this class. The compartmental approximation (point) is a coarser
    model in the same family.
- phenomenon: Steady-state heat conduction with temperature-dependent conductivity
  debate: "Still a source-sink-diffusion system, but nonlinear conductivity could alter universality; debate whether it belongs to the same class due to material nonlinearity."
- phenomenon: Quasi-steady morphogen gradient with slow temporal regulation
  debate: "Gradients change over developmental time; very slow dynamics may approximate steady-state, but active feedback blurs the boundary of a purely passive gradient."
- phenomenon: Concentration profile in a packed-bed reactor with small Péclet number
  debate: "Advection-diffusion-reaction with weak advection; small but non-zero convection challenges the pure diffusion assumption, complicating mechanism classification."
- phenomenon: Electrostatic potential around fixed charges in a dielectric
  debate: "Obeys Poisson's equation (same mathematical form as steady-state diffusion with source), but the mechanism is electrostatic, not transport; shared equation but incompatible domain."
references:
- Fick 1855 Ann. Physik 94, 59 (Fick's law)
- Crank 1975 The Mathematics of Diffusion
- Wolpert 1969 J. Theor. Biol. 25, 1 (positional information / morphogen)
- Oke 1987 Boundary Layer Climates (urban heat island)
- Theis 1935 Trans. Am. Geophys. Union 16, 519 (groundwater flow)
