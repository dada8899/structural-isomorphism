class_id: percolation_connectivity__geometric_lattice
status: speculative
display_name: Geometric percolation on low-dimensional lattice (dimension-dependent exponents)
display_name_zh: 几何渗流 (低维格点, 维度相关指数)
hub_phenomenon: 'P_∞ ∝ (p - p_c)^β with β, ν, γ determined by lattice dimension (e.g., 2D: β = 5/36, ν = 4/3).'
shared_equation: 'Order parameter (giant component fraction): P_∞(p) ∝ (p - p_c)^β.

  Correlation length: ξ ∝ |p - p_c|^{-ν}.

  Cluster size distribution at p_c: P(s) ∝ s^{-τ_perc}.

  Critical probability p_c for bond percolation on infinite network: depends on lattice/topology.

  Granovetter threshold: actor acts iff fraction-of-active-neighbors > θ_i.

  '
key_invariants:
- Order parameter scales as P_∞ ∝ (p - p_c)^β
- 'Correlation length diverges: ξ ∝ |p - p_c|^{-ν}'
- Second-order (continuous) phase transition — no hysteresis
- Cluster size distribution power-law at criticality
- Universal exponents (β, ν, γ) depend only on lattice dimension
positive_examples:
- phenomenon: Social identity transmission (社会认同传播)
  evidence: 'Hub. Layer 4 prediction: β ∈ [0.30, 0.45] (between Granovetter and 2D Ising), ν ∈ [0.90, 1.10], p_c (neighbor
    activation threshold) ∈ [0.15, 0.30] on Reddit political community data.'
  verified_at: candidate
- phenomenon: Active fund liquidity externality (流动性外部性)
  evidence: Critical density of indexed funds triggers liquidity-cliff transition. Phase transition signature in trading-volume
    vs index-share data.
  verified_at: candidate
- phenomenon: Competitive entry critical scale defense threshold (临界规模防御门槛)
  evidence: Network effect threshold for defensive market position. Below critical share, entrants can disrupt; above, incumbent
    locks in.
  verified_at: candidate
- phenomenon: Porous media fluid flow / oil reservoir connectivity
  evidence: Bond percolation on rock pore network; oil recovery efficiency tied to p_c.
  verified_at: candidate
- phenomenon: Epidemic threshold p_c on contact network
  evidence: R_0 = 1 corresponds to percolation transition on transmission network.
  verified_at: candidate
negative_examples:
- phenomenon: Earthquake fault network
  reason: Surface similarity (network of faults, stress propagation) but the dynamics are threshold-cascade-driven, not equilibrium
    occupancy. Belongs to soc_threshold_cascade.
- phenomenon: DeFi liquidation cascade
  reason: Liquidation network shows cascade dynamics (Motter-Lai), not equilibrium percolation. The order parameter is cascade
    size, not giant-component fraction. Belongs to motter_lai_network_cascade.
- phenomenon: Random graph G(N, p) without process
  reason: Static percolation IS this class — but only when there's a dynamic process (epidemic, opinion spread, fluid flow)
    on top, not just topology. Bare random graph is the model not the phenomenon.
- phenomenon: Crystal lattice ordering
  reason: Ising-like ordering with continuous symmetry; equilibrium_critical_ising class. Different universality class with
    different exponents.
- phenomenon: Mean-field percolation on a random graph
  reason: "Exhibits a connectivity transition with P_∞ ∝ (p - p_c)^β, but exponents are mean-field (e.g., β=1) independent of spatial dimension; the infinite-dimensional topology eliminates the geometric lattice constraints essential to this class."
- phenomenon: High-dimensional geometric percolation (d ≥ 6)
  reason: "Still on a hypercubic lattice and follows the same percolation formalism, but above the upper critical dimension exponents become dimension-independent and mean-field, violating the dimension-dependent exponent requirement of this class."
- phenomenon: Fortuin-Kasteleyn (FK) cluster percolation in the 2D Ising model
  reason: "Percolation of spin-aligned clusters at the Ising critical point superficially resembles geometric connectivity, but exponents (e.g., β=1/8, ν=1) are those of the Ising universality class, not pure geometric percolation, due to thermal correlations."
- phenomenon: Bootstrap percolation (continuous transition regime)
  reason: "Connectivity emerges through a k-core pruning process, and while an order parameter can be defined, the transition exponents (e.g., β may be 0.5 or other) differ from standard geometric percolation because of the non-local culling rule."
- phenomenon: Directed percolation
  reason: "Looks like anisotropic connectivity on a lattice, but the directional bias changes the symmetry and universality class; critical exponents (e.g., β ≈ 0.276 in 2D) are those of the directed percolation class, incompatible with isotropic geometric percolation."
edge_cases:
- phenomenon: Forest fire spread
  debate: Drossel-Schwabl 1992 forest fire IS percolation-like at the right tree-density limit (p_c). But the slow-driving
    dynamics produce SOC. Same system has both percolation (static) and SOC (driven) descriptions. Class boundary.
- phenomenon: Network robustness to random failure vs targeted attack
  debate: Both reduce to percolation problems with different occupancy patterns. Scale-free networks have p_c → 0 under attack
    (Cohen et al. 2000). Strong overlap with scale_free_percolation_class.
- phenomenon: "Percolation on fractal lattices (e.g., Sierpinski carpet)"
  debate: "Uses the same geometric percolation equations on a low-dimensional lattice, but exponents are determined by fractal dimension or spectral dimension rather than integer lattice dimension; often treated as a separate class, though it clearly extends the geometric framework."
- phenomenon: Long-range percolation with power-law decaying bond probability
  debate: "When connection probability decays as ∼r^{-σ}, the universality class can cross over from geometric to mean-field; for certain σ it may retain dimension-dependent exponents, making boundary with the pure geometric class ambiguous."
- phenomenon: Correlated percolation from q-state Potts model FK representation
  debate: "The FK clusters percolate at the Potts critical point and live on the same lattice, but the critical exponents belong to the q-state Potts universality class; often considered distinct, yet it is a direct generalization of geometric percolation (q=1) using identical equations."
- phenomenon: Invasion percolation in a gradient
  debate: "The pinned interface and cluster structure near the percolation threshold share scaling with ordinary geometric percolation, but the non‑equilibrium, externally driven mechanism generates different critical exponents; debates persist over whether it falls into the same static universality class."
references:
- Broadbent, Hammersley 1957 Proc. Camb. Phil. Soc. 53, 629 (original percolation)
- Stauffer, Aharony 1994 Introduction to Percolation Theory
- Granovetter 1978 Am. J. Sociol. 83, 1420 (threshold models)
- Watts, Strogatz 1998 Nature 393, 440 (small-world)
- Cohen, Erez, ben-Avraham, Havlin 2000 Phys. Rev. Lett. 85, 4626 (resilience to attack)
