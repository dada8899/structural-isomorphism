class_id: soc_threshold_cascade
status: well-established
display_name: "SOC threshold cascade"
display_name_zh: "SOC 阈值级联"
hub_phenomenon: "Slowly driven threshold-cascade systems that organize toward a critical state without parameter tuning"
shared_equation: |
  Threshold cascade: Σ_j K_ij · δ_j > threshold_i → failure_i;
  redistribute Δs_i to neighbors via K_ij;
  critical condition <Σ_j K_ij> → 1 (branching-process criticality).
  Motter-Lai cascade form: L_i(t+1) = L_i(t) + Σ_{j ∈ F(t)} L_j · w_ij / Σ_k w_jk,
  fail if L_i > C_i.
key_invariants:
  - "Power-law event-size: P(s) ∝ s^(-τ), τ ≈ 1.5 (mean-field) to 3.0 (subcritical / observable-dependent)"
  - "Omori-Utsu aftershock decay: n(t) ∝ 1/(t+c)^p, p ≈ 0.8-1.2 for endogenous cascades; p ≈ 0.2-0.4 for exogenously-forced systems"
  - "Branching-process criticality: branching ratio m → 1"
  - "Scale invariance: no characteristic event size below upper cutoff"
  - "Waiting-time Pareto tail (heavy-tailed inter-event intervals)"
  - "Scaling relation γ = (α_T - 1)/(τ - 1) holds across bin widths when system is genuinely critical"
positive_examples:
  - phenomenon: "USGS global earthquakes M≥3.5, 2020-2025"
    evidence: "Phase 1: b = 1.084 ± 0.005 (Aki MLE), bootstrap 95% CI [1.073, 1.094]; Clauset α_energy = 1.794 ± 0.024 on 1,071 tail events; Omori-Utsu p = 0.941 ± 0.017 on 24,680 stacked aftershocks across 580 main shocks, weighted R² = 0.9927 over 3 decades in time"
    verified_at: "2026-04-15"
    paper: "v4/validation/soc-earthquake/paper.md"
  - phenomenon: "S&P 500 daily log returns 1990-2025"
    evidence: "Phase 2: Clauset α_{|r|} = 2.998 ± 0.041 on 9,060 returns (inverse cubic law of Gopikrishnan 1998 recovered to 0.07%); power-law beats lognormal at R = -6.12, p = 9.3×10^-10; daily-scale Omori p = 0.286 ± 0.034 on 318 3σ main shocks (inside Weber 2007 daily band [0.3, 0.6])"
    verified_at: "2026-04-15"
    paper: "v4/validation/soc-stockmarket/paper.md"
  - phenomenon: "DeFi liquidations on Aave V2, Compound V2, MakerDAO Dog (43,065 events, 2020-2024)"
    evidence: "Phase 3 v2: per-protocol α = 1.684 ± 0.010 (Aave), 1.649 ± 0.016 (Compound), 1.567 ± 0.015 (Maker) — cross-protocol spread 0.12; every protocol rejects lognormal at p < 10^-9; 1-hour Omori p = 0.733 / 0.761 / 0.692 (spread 0.07) across three architecturally distinct liquidation mechanisms"
    verified_at: "2026-04-16"
    paper: "v4/validation/soc-defi/paper.md"
  - phenomenon: "Mouse ALM cortex neural avalanches, DANDI:000006 delay-response task (1.39M spikes from 71 units)"
    evidence: "Phase 4: scaling relation γ = (α_T-1)/(τ-1) ≈ 1.10 satisfied to 2-3% across 16× bin-factor sweep (the strong test for criticality); τ ∈ [2.17, 3.00], α_T ∈ [2.49, 2.94] consistent with Priesemann 2014 sub-critical task regime; synthetic BGW pipeline-check recovers mean-field τ=1.50, α_T=1.92"
    verified_at: "2026-04-16"
    paper: "v4/validation/soc-neural/paper.md"
  - phenomenon: "U.S. wildfire burned-area distribution, NIFC Interagency Fire Perimeter History (21,022 fires)"
    evidence: "Phase 10: Clauset α = 1.660 ± 0.017 on tail of 1,591 above x_min = 1,199 acres, bootstrap 95% CI [1.381, 1.808]; inside Drossel-Schwabl band [1.3, 2.5]; Omori p = 0.239 ± 0.050 reflects seasonal forcing rather than relaxation cascade. Lognormal alternative also fits (R = -4.73) — Reed-Hughes 2002 critique applies"
    verified_at: "2026-05-13"
    paper: "v4/validation/soc-wildfire/paper.md"
  - phenomenon: "GOES X-ray solar flares, NOAA NGDC catalog 2000-2016 (29,907 deduplicated events)"
    evidence: "Phase 11: Clauset α_peak = 2.194 ± 0.018, bootstrap 95% CI [2.159, 2.248], x_min = 5.2×10^-6 W/m² ≈ M0.5; inside Lu-Hamilton 1991 band [1.5, 2.5]; vs exponential R = +15.06 (p ≈ 3×10^-51); vs lognormal inconclusive (R = +0.44, p = 0.66); IAT power-law α_IAT = 2.65 reproduces Wheatland 2000; Omori p ≈ 0 (no aftershock decay) matches state-dependent Poisson picture — decouples size and temporal signatures as expected for solar physics"
    verified_at: "2026-05-13"
    paper: "v4/validation/soc-solar/paper.md"
negative_examples:
  - phenomenon: "Twitter retweet cascade size distribution"
    reason: "Surface power-law BUT generative mechanism is preferential attachment + social homophily, not threshold-stress cascade. Belongs to preferential_attachment class. No analog of Coulomb-style stress redistribution exists between followers."
  - phenomenon: "SIR-type epidemic spread (mass-action)"
    reason: "Mass-action mean-field dynamics dS/dt = -βSI; no threshold at individual level — every contact carries fixed transmission probability. No stress accumulation. Belongs to sir_contagion_network_class."
  - phenomenon: "Wikipedia article views / Zipf word frequencies"
    reason: "Heavy-tailed but generated by cumulative-advantage attachment (Simon 1955 / Yule 1925), not by discrete threshold cascade. Belongs to preferential_attachment."
  - phenomenon: "1/f noise in resistor thermal fluctuation"
    reason: "Linear superposition of independent relaxation timescales — Kogan 1996 spectral mechanism, not avalanche cascade. Power-spectrum 1/f signature is necessary but not sufficient for SOC class membership."
  - phenomenon: "Kuramoto firefly synchronization"
    reason: "Phase-coupled oscillators reaching coherence transition; order parameter is global phase coherence r, not avalanche size distribution. Belongs to kuramoto_sync."
- phenomenon: "City population sizes (Zipf's law)"
  reason: "Exhibits a heavy-tailed distribution similar to crackling noise, but originates from multiplicative growth (Gibrat's law) without a threshold cascade mechanism."
- phenomenon: Epidemic superspreading event size
  reason: "Power-law distributed secondary infections resemble cascade sizes, but the mechanism is fixed heterogeneity in individual reproduction numbers, not self-organized criticality or redistribution."
- phenomenon: Paper citation counts
  reason: "Scale-free degree distribution arises from preferential attachment, not from threshold-driven cascades of failures or events."
- phenomenon: Internet packet burst lengths
  reason: "Heavy-tailed burst statistics stem from self-similar traffic generation and TCP congestion control, lacking the local threshold and load redistribution core to the class."
- phenomenon: Ising model at critical temperature
  reason: "Produces power-law cluster size distributions and scaling, but is an equilibrium phase transition requiring fine-tuning of temperature, not a slowly driven threshold-cascade system that self-organizes without parameter tuning."
- phenomenon: Granovetter threshold model of collective behavior
  reason: "Cascade size distributions can be scale-free at a fixed threshold, but the system is a one-shot cascade from a seed and requires external tuning of the threshold parameter, lacking slow driving and load redistribution inherent in self-organized criticality."
- phenomenon: Nuclear chain reaction at exact criticality
  reason: "Exhibits branching-process criticality with power-law chain lengths, but the branching ratio is held at 1 by external control rods, not by self-organized dynamics with threshold failure and stress redistribution."
- phenomenon: 1/f noise from superposition of random telegraph signals (McWhorter model)
  reason: "Yields 1/f-like spectra and heavy-tailed fluctuations but arises from the additive sum of many independent two-level fluctuators, with no threshold activation or avalanche dynamics."
edge_cases:
  - phenomenon: "Solar flare temporal sequence (Omori test)"
    debate: "Phase 11 confirmed α ∈ [1.5, 2.5] CONFIRMED at size level but Omori p ≈ 0 with R² = 0.05 — i.e. size signature is SOC but no temporal Omori decay. Solar flares are a hybrid: SOC at size level + state-dependent Poisson at time level (Wheatland 2000). We keep them as SOC class members and treat the absence of Omori as a *corroborating* signature (because the physics predicts no relaxation cascade beneath a slow magnetic driver)."
  - phenomenon: "Wildfire size distribution vs lognormal alternative"
    debate: "Phase 10 recovered α = 1.66 inside band, but Clauset likelihood-ratio decisively prefers lognormal (R = -4.73, p < 10^-5). We retain the class assignment because (a) functional form + exponent band agreement is the published SOC criterion, (b) Reed-Hughes 2002 critique applies to virtually every empirical heavy-tail and would invalidate the entire SOC literature if treated as falsification, (c) Clauset et al. 2009 note that distinguishing power-law from lognormal at n_tail ~ 10^3 is statistically hard even with known generators."
  - phenomenon: "Task-active mouse cortex avalanche exponents (τ ≈ 2.8) vs spontaneous Beggs-Plenz τ ≈ 1.5"
    debate: "Same SOC class but different sub-fixed-point. Phase 4 shows the scaling relation γ holds (system is genuinely critical) but the recording sits in the sub-critical sub-class (Priesemann-Munk-Wibral 2014, m < 1). The SOC equivalence class in biology contains *at least* two distinguishable sub-classes — spontaneous-MF and task-subcritical — and brain-state labeling is a first-class feature of any neural SOC dataset."
- phenomenon: Barkhausen noise in ferromagnets
  debate: "Avalanche size and waiting-time scaling match SOC, but the underlying depinning transition may require fine-tuning; debated whether it is truly self-organized or an ordinary critical point."
- phenomenon: Earthquake sequences from ETAS model
  debate: "The model reproduces Omori law and power-law sizes only when the branching ratio is tuned near 1; real seismicity may self-organize, but the model itself lacks a self-tuning mechanism."
- phenomenon: Landslide magnitude-frequency distribution
  debate: "Observed power-law scaling often includes an exponential cutoff, suggesting subcritical dynamics and raising questions about whether landslides are genuine SOC or finite-size effects."
- phenomenon: Slow slip events (SSEs) on tectonic faults
  debate: "SSE catalogues show scale-invariant sizes and temporal clustering, but the dominant role of fluid pressure and aseismic creep may place them at the boundary between threshold cascades and externally forced systems."
- phenomenon: Power grid cascading blackouts (OPA model)
  debate: "Slowly driven by load growth with line failures at thermal limits and power redistribution, yielding heavy-tailed blackout sizes; observations suggest SOC, but exogenous events and operational interventions may prevent true self-organization, making classification ambiguous."
- phenomenon: Strain avalanches in sheared amorphous solids (yielding transition)
  debate: "Under slow shear, threshold-activated plastic events redistribute stress via Eshelby kernels, producing power-law avalanche statistics; however, the critical point may be a tuned non-equilibrium transition (depinning) rather than a self-organized state, and some models require disorder tuning."
- phenomenon: Neuronal avalanches in dissociated cultures (Beggs-Plenz type)
  debate: "Display scale-free burst sizes and branching ratios near 1, consistent with SOC threshold cascades, yet the mechanism may rely on homeostatic synaptic plasticity to set excitability, which is a biological tuning process rather than pure self-organization via threshold failure and stress redistribution."
- phenomenon: Landslide size distributions
  debate: "Power-law frequency-area statistics resemble SOC, but the driving is irregular (rainfall) rather than slow steady forcing, and failure events may not involve significant stress transfer to neighboring slopes; thus, whether they reflect true threshold-cascade SOC or merely scale-free topography with stochastic triggers is contested."
