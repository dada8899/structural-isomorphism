class_id: adverse_selection_unraveling_class__spiral_of_silence
status: speculative
display_name: Spiral of silence (social conformity + fear-of-isolation cascade)
display_name_zh: 沉默的螺旋 (社会从众级联)
hub_phenomenon: Perceived minority opinions self-silence under conformity pressure; majority view amplifies via positive feedback
  on visibility.
shared_equation: "Akerlof 1970 conditional expectation: p* = E[q | p*]; equilibrium when expected quality matches price.\n\
  Unraveling dynamics: x_{t+1} = f(x_t), f monotone decreasing.\nDiversity / quality dynamics: D(t+1) = D(t)·(1-α) + β·N(t),\n\
  \  where α = homogenization rate (recommendation algorithm reinforcement),\n  β = new heterogeneous-content creator entry\
  \ rate.\nCollapse condition: α > β → D → 0.\n"
key_invariants:
- 'Akerlof conditional expectation equilibrium: p* = E[q | p*]'
- 'Monotone unraveling: x_{t+1} = f(x_t), f'' < 0'
- 'Diversity dynamic: D(t+1) = D(t)·(1-α) + β·N(t)'
- 'Quality collapse condition: α > β'
- Self-selection bias drives positive feedback even without external shock
positive_examples:
- phenomenon: Akerlof lemons market (used cars)
  evidence: Original 1970 formulation. Buyers cannot distinguish quality → average price reflects average quality → high-quality
    sellers exit → average quality drops → cycle continues. Hub of class.
  verified_at: candidate
- phenomenon: Information cocoon / 信息茧房
  evidence: Recommendation algorithm optimizes engagement → reduces diversity → heterogeneous creators get less attention
    → exit → less diversity. Same unraveling dynamic. Layer 3 explicit equation match.
  verified_at: candidate
- phenomenon: Spiral of silence (沉默螺旋机制)
  evidence: Minority opinion holders silent → majority appears stronger → more minority silent. Noelle-Neumann 1974. Same
    monotone unraveling.
  verified_at: candidate
- phenomenon: Echo chamber effect in social media
  evidence: Engagement-optimized recommendation reinforces homophily, drives out heterogeneous content. Same Akerlof structure.
  verified_at: candidate
negative_examples:
- phenomenon: Earthquake aftershock decay
  reason: No information asymmetry; pure stress-relaxation cascade. Belongs to soc_threshold_cascade.
- phenomenon: Stock market crash
  reason: 'Edge case: crashes can involve information asymmetry (lemon-like signaling about firm quality), but the main mechanism
    is liquidity spiral / margin cascade, not adverse selection unraveling. Belongs to soc_threshold_cascade.'
- phenomenon: Bank run
  reason: Diamond-Dybvig is multiple-equilibrium coordination, not information-asymmetry-driven gradual unraveling. Belongs
    to multistable_self_fulfilling.
- phenomenon: Preferential attachment / rich-get-richer
  reason: BA model is *positive* feedback on degree, not selective exit of high-quality. Different mechanism; both produce
    heavy tails but via different routes.
- phenomenon: Asch conformity experiments
  reason: "Individuals yield to an incorrect majority under immediate direct pressure, but this is a static, one-shot influence; it lacks the temporal, self-reinforcing spiral driven by perceived climate of opinion and fear of isolation."
- phenomenon: Information cascades in economics
  reason: "Observational learning leads agents to ignore private signals and follow predecessors, resembling minority opinion suppression, but the mechanism is rational inference in sequential decision-making, not fear of social isolation."
- phenomenon: Preferential attachment in network growth
  reason: "Existing popularity drives new connections via a rich-get-richer feedback, visually similar to majority amplification, but it arises from network topology and visibility, not from social conformity or expressive self-censorship."
- phenomenon: Algorithmic filter bubbles
  reason: "Curated information environments reinforce existing views and create illusory majorities, but the suppression of minority perspectives is due to selective exposure, not active self-silence from fear of isolation."
- phenomenon: Granovetter threshold models of collective action
  reason: "Individuals act only when enough others do, producing cascades, but the mechanism is based on private participation thresholds and observational cues for action, not on conformist expression of opinions under social pressure."
- phenomenon: Preferential attachment in scale-free networks
  reason: "Rich-get-richer emergent majority resembles spiral of silence, but driven by network growth mechanics and cumulative advantage, not by fear of social isolation or normative conformity."
- phenomenon: "Market tipping with network effects (e.g., VHS vs Betamax)"
  reason: "Adoption cascade makes minority option disappear, but mechanism is coordination value and switching costs, not individuals self-censoring due to social pressure."
- phenomenon: Informational cascades in financial herding
  reason: "Individuals abandon private signals to follow predecessors, causing a cascade, but the driver is rational inference under uncertainty, not fear of social disapproval."
- phenomenon: Epidemic spreading of behavior via simple contagion
  reason: "Threshold models can show a majority opinion becoming dominant through contact-based diffusion, but no conformity pressure nor perceived opinion climate is involved."
- phenomenon: Allee effect in population dynamics
  reason: "A minority population can collapse to extinction via a positive feedback loop where rarity reduces fitness, but the mechanism is ecological, not social-normative."
edge_cases:
- phenomenon: Insurance market adverse selection (Rothschild-Stiglitz 1976)
  debate: Canonical positive example. Healthy customers exit pool → premiums rise → more healthy exit. Class membership clear.
    The separating-equilibrium variant uses contract menus to break unraveling — still in this class, just with additional
    structure.
- phenomenon: Academic field decline
  debate: Top researchers exit shrinking field → quality of remaining work drops → more top researchers exit. Plausible unraveling
    but mechanism includes both information asymmetry and reputation dynamics. Loose class assignment.
- phenomenon: Pluralistic ignorance
  debate: "It is a state where individuals misperceive group norms, often causing people to self-silence, but it can exist without the dynamic spiral of silence and its underlying fear-of-isolation motive, making the boundary between static misperception and feedback-driven cascade ambiguous."
- phenomenon: Bandwagon effect in voting
  debate: "People shift support to the perceived front-runner, creating a self-reinforcing majority; the positive feedback loop mirrors the spiral of silence, but the motivational driver (desire to be on the winning side vs. fear of social isolation) may or may not be structurally isomorphic."
- phenomenon: Group polarization
  debate: "Like-minded discussion intensifies initial leanings, which could involve self-censorship of moderate voices, but the primary mechanisms (persuasive arguments, social comparison) might not require fear of isolation, blurring the line with the spiral of silence class."
- phenomenon: Minority influence (consistent minority converting majority)
  debate: "It is a reverse dynamic where an initially minority view gains traction through consistency, not silence, yet the underlying feedback structure (amplification of expressed views) could be a sign-flipped version of the same universality class, making its classification debatable."
- phenomenon: Pluralistic ignorance
  debate: "Individuals publicly conform to a perceived majority that they privately reject, leading to a self-reinforcing false consensus; deeply related to spiral of silence but the driver is erroneous perception of what others think, not specifically fear of isolation."
- phenomenon: Groupthink in cohesive decision groups
  debate: "Suppression of dissent to maintain group harmony shares conformity pressure and self-censorship, but the context is face-to-face small groups and the mechanism centers on cohesion rather than broad fear-of-isolation dynamics."
- phenomenon: Echo chambers and filter bubbles online
  debate: "Lack of exposure to minority views can mimic the spiral outcome, but the process is often driven by algorithmic curation and selective exposure rather than active self-silencing from anticipated disapproval."
- phenomenon: Broken windows theory of neighborhood decline
  debate: "Visible disorder leads to further norm erosion through perceived social norms; similar feedback loop exists but it relies on signaling and rational updating about social control, not necessarily fear-of-isolation-driven self-silencing."
- phenomenon: Reinformancing loops in authoritarian contexts
  debate: "Citizens publicly display support for a regime they privately oppose, reinforcing apparent majority, driven by fear of repression; this mechanical proximity to spiral of silence blurs the line between fear of isolation and fear of state-sanctioned punishment."
references:
- Akerlof 1970 Q. J. Econ. 84, 488 (Market for Lemons)
- Rothschild, Stiglitz 1976 Q. J. Econ. 90, 629 (equilibrium under adverse selection)
- Noelle-Neumann 1974 J. Communication 24, 43 (spiral of silence)
- Spence 1973 Q. J. Econ. 87, 355 (job market signaling — closely related)
- Pariser 2011 The Filter Bubble (information cocoon)
