class_id: schelling_credible_commitment
status: speculative
display_name: Schelling credible commitment (irreversible sunk-cost signaling)
display_name_zh: Schelling 可信承诺 (不可逆沉没成本)
hub_phenomenon: Strategic actors invest in sunk costs to make threats credible; ex-ante optimum ≠ ex-post optimum (Kydland-Prescott
  time inconsistency)
shared_equation: "Payoff comparison: payoff(commit) > payoff(flexible) iff sunk_cost > defection_gain.\nTime-inconsistency:\
  \ max_x U(x, e) s.t. e = E[x].\nRepeated game + incomplete contract:\n  max Σ β^t · u_i(a_t) subject to self-enforcement\
  \ constraint.\nAudience cost (Fearon 1997): public commitment raises defection cost via reputation.\n"
key_invariants:
- Sunk cost > defection gain triggers credible commitment
- Ex-ante ≠ ex-post optimum (time inconsistency)
- Discount factor β controls cooperation enforcement
- Audience cost makes commitment costly to break
positive_examples:
- phenomenon: Entry deterrence with overcapacity commitment (进入威慑与产能过度承诺)
  evidence: 'Hub. Dixit 1980 model: incumbent invests in excess capacity → credible threat → entrant deterred.'
  verified_at: candidate
- phenomenon: International trade tariff retaliation (国际贸易的关税报复)
  evidence: 'Layer 4 prediction: logit(p_exec) = a + b·s where s = sunk_cost/expected_loss, b ∈ [1.2, 2.6] on 620 WTO disputes
    1995-2025.'
  verified_at: candidate
- phenomenon: Bundled concession strategy (捆绑让步策略)
  evidence: Negotiation tactic where concessions are bundled to prevent ex-post reneging on individual items.
  verified_at: candidate
- phenomenon: Time inconsistency problem (时间不一致性问题)
  evidence: 'Kydland-Prescott 1977 monetary policy: optimal pre-announcement ≠ optimal ex-post. Layer 3 explicit match.'
  verified_at: candidate
- phenomenon: Incomplete contracts and hold-up problem (合同不完全性与敲竹杠)
  evidence: Williamson / Grossman-Hart-Moore. Specific investments without complete contracts create hold-up risk.
  verified_at: candidate
negative_examples:
- phenomenon: Iterated Prisoner's Dilemma cooperation
  reason: Cooperation via tit-for-tat reputation, not via sunk-cost commitment. Different game structure. Belongs to a separate
    iterated-game class.
- phenomenon: Auction bidding
  reason: Static-payoff competitive equilibrium, no time inconsistency. Different class.
- phenomenon: Stock market trading
  reason: Reversible transactions; no sunk-cost commitment role. Different class.
- phenomenon: Real options waiting to invest (Dixit-Pindyck)
  reason: "Sunk costs create an option value of waiting under uncertainty, but the mechanism is optimal timing, not strategic commitment to make a threat credible. No strategic adversary."
- phenomenon: Costly signaling in job market (Spence education signaling)
  reason: "Sunk cost (education) separates worker types under asymmetric information, but the purpose is to signal quality, not to commit to a future threat. The ex-ante/ex-post mismatch serves a different function."
- phenomenon: War of attrition (all-pay auction)
  reason: "Bidders sink costs incrementally to outlast rivals, but there is no pre-commitment; costs are incurred during the conflict. The mechanism is endurance, not irreversible signaling of commitment."
- phenomenon: Schelling segregation model (threshold tipping)
  reason: "Shares Schelling’s name, but the mechanism involves emergent neighborhood patterns from preference thresholds with no sunk-cost signaling or strategic commitments."
- phenomenon: Corporate debt overhang (Myers)
  reason: "Existing debt alters investment incentives by shifting payoffs, but this is a consequence of financial structure, not a deliberate sunk-cost move to make a subsequent threat credible."
edge_cases:
- phenomenon: Central bank inflation targeting
  debate: Canonical positive example. Public commitment to target makes deviation politically costly (audience cost). Class
    membership accepted.
- phenomenon: Pre-emptive capacity expansion (Spence-Dixit entry deterrence)
  debate: "The canonical example of schelling_credible_commitment, but the boundary blurs when capacity is not fully sunk (resalable); the commitment mechanism then competes with signaling or mere preemption."
- phenomenon: Burning money in a Cournot game (irreversible cost-reducing investment)
  debate: Ambiguous whether the sunk cost serves to signal private cost type (signaling) or to irrevocably commit to higher output (commitment); both mechanisms can coexist and are often confounded in the literature.
- phenomenon: "Tying hands through international treaties (e.g., fixed exchange rate)"
  debate: "Costly exit from treaties makes policy threats credible, but the enforcement often relies on reputation and repeated interaction, blurring the line between sheer sunk-cost commitment and dynamic game strategies."
- phenomenon: Hostile takeover defenses (poison pills)
  debate: "Adopting a poison pill is a sunk cost that deters raiders by making the firm less attractive, but its primary function is to change the control structure, not necessarily to make a strategic threat credible in a bargaining sense."
- phenomenon: Marriage as a commitment device
  debate: "The high cost of divorce can commit partners to the relationship, but the ‘threat’ of staying together is often about solving hold-up and investment incentives rather than making an external threat credible; the payoff change is mutual rather than adversarial."
notes: 'LLM-proposed cluster grouping game-theoretic commitment phenomena. Speculative because:

  (1) the unifying invariant is qualitative (sunk cost > defection gain) rather than a sharp

  quantitative equation; (2) individual members are well-studied but their isomorphism is

  weakly quantitative. Layer 5 verification would require building a standard sunk-cost

  metric across heterogeneous domains.

  '
references:
- Schelling 1960 The Strategy of Conflict
- Kydland, Prescott 1977 J. Pol. Econ. 85, 473 (time inconsistency)
- Dixit 1980 Econ. J. 90, 95 (entry deterrence)
- Fearon 1997 J. Conflict Res. 41, 68 (audience costs)
- Grossman, Hart 1986 J. Pol. Econ. 94, 691 (incomplete contracts)
