class_id: sir_contagion_network_class__balance_sheet_cascade
status: speculative
display_name: Balance-sheet contagion cascade (no-recovery clearing equilibrium)
display_name_zh: 资产负债表传染级联 (无恢复，清算均衡)
hub_phenomenon: 'Eisenberg-Noe clearing vectors: defaults are absorbing, no recovery compartment. Critical threshold is leverage/capital-ratio
  based, not γ-based.'
shared_equation: "Kermack-McKendrick SIR (mean-field):\n  dS/dt = -β·S·I/N,\n  dI/dt = β·S·I/N - γ·I,\n  dR/dt = γ·I.\nNetwork\
  \ SIR: dX_i/dt = β·Σ_j A_ij·X_j·(1-X_i) - γ·X_i.\nBasic reproduction number: R_0 = β·⟨k⟩/γ.\nEpidemic threshold: R_0 > 1\
  \ → outbreak.\nFinal epidemic size: R_∞/N = 1 - exp(-R_0·R_∞/N).\n"
key_invariants:
- SIR master equation dS/dt = -βSI; dI/dt = βSI - γI; dR/dt = γI
- R_0 = β⟨k⟩/γ controls phase transition
- R_∞/N ≈ 1 - 1/R_0 for R_0 not too large
- 'Topology shifts threshold: scale-free networks have R_0 → 0 critical (no epidemic threshold)'
- Mass-action transmission (no individual-level threshold)
positive_examples:
- phenomenon: Emerging markets contagion domino effect (新兴市场传染的多米诺效应)
  evidence: 'Hub. Layer 4 prediction: R_0 ∈ [1.3, 2.8] during crisis; β/γ leads CDS spreads by 5-20 days. SIR fit to 6 major
    crises 1994-2024.'
  verified_at: candidate
- phenomenon: CDS index credit cascade modeling
  evidence: Network SIR on CDS counterparty graph. Layer 3 medium-confidence match.
  verified_at: candidate
- phenomenon: OTC derivatives counterparty exposure
  evidence: Same SIR mechanism on bilateral exposure graph; topology shifted from bow-tie to star via CCP intermediation.
  verified_at: candidate
- phenomenon: Drug-resistant bacteria transmission (耐药菌传播)
  evidence: SIR on hospital contact network with reservoir compartment. Standard infectious disease model.
  verified_at: candidate
negative_examples:
- phenomenon: Earthquake aftershock cascade
  reason: No individual susceptibility/infection state; cascade is mechanistic stress transfer. Belongs to soc_threshold_cascade.
- phenomenon: DeFi liquidation cascade
  reason: Threshold cascade (Motter-Lai), not mass-action transmission. Liquidations don't 'infect' counterparties — they
    redistribute load. Belongs to motter_lai_network_cascade.
- phenomenon: Watts threshold cascade on social network
  reason: Individual threshold rule (fraction of infected neighbors > θ_i), NOT mass-action β·S·I. Different microscopic dynamics.
    Belongs to motter_lai_network_cascade or percolation_connectivity.
- phenomenon: Network failure via random component failure
  reason: Independent failures; no infection-style state coupling. Belongs to percolation_connectivity.
edge_cases:
- phenomenon: Bank run with information cascade
  debate: Information-driven 'infection' of withdrawal behavior could fit SIR. But payoff structure is coordination game (multistable_self_fulfilling),
    not SIR. Class assignment depends on whether you model belief contagion (SIR) or strategic decision (game theory).
- phenomenon: Twitter retweet cascade
  debate: Often modeled as SIR-like (Goel et al. 2012). But preferential attachment + homophily also contribute. Heterogeneous
    class membership.
- phenomenon: Cascading default on interbank network
  debate: Can be modeled as SIR (default infects creditors) OR as Eisenberg-Noe clearing (Motter-Lai). Same data, two valid
    generative models. Class boundary.
references:
- Kermack, McKendrick 1927 Proc. Roy. Soc. A 115, 700 (original SIR)
- Anderson, May 1991 Infectious Diseases of Humans
- Pastor-Satorras, Vespignani 2001 Phys. Rev. Lett. 86, 3200 (epidemic on scale-free)
- Allen, Gale 2000 J. Pol. Econ. 108, 1 (financial contagion)
- Forbes, Rigobon 2002 J. Finance 57, 2223 (contagion measurement)
