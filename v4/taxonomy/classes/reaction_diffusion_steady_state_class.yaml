class_id: reaction_diffusion_steady_state_class
status: emerging
display_name: "Steady-state reaction-diffusion gradient field"
display_name_zh: "зЁіжҖҒеҸҚеә”-жү©ж•ЈжўҜеәҰеңә"
hub_phenomenon: "Concentration / temperature gradients in 2D/3D space, generated by source-sink balance with diffusion; characteristic length О» = вҲҡ(D/k)"
shared_equation: |
  Master PDE: вҲӮc/вҲӮt = DВ·вҲҮВІc - kВ·c + S(x).
  Steady state: DВ·вҲҮВІc - kВ·c + S(x) = 0.
  Characteristic length: О» = вҲҡ(D/k).
  2D radial point-source: u(r) вҲқ -ln(r/О») (logarithmic decay).
  3D radial: u(r) вҲқ (1/r)В·exp(-r/О») (Yukawa form).
  Linear superposition (no Turing instability).
key_invariants:
  - "PDE form: вҲӮc/вҲӮt = DВ·вҲҮВІc - kВ·c + S(x)"
  - "Steady-state characteristic length О» = вҲҡ(D/k)"
  - "2D radial logarithmic decay; 3D Yukawa decay"
  - "Linear superposition (NO pattern formation; that's reaction_diffusion_turing)"
  - "Source-sink balance at steady state"
positive_examples:
  - phenomenon: "Urban heat island spatial gradient (еҹҺеёӮзғӯеІӣж•Ҳеә”)"
    evidence: "Hub. Layer 4 prediction: О» вҲҲ [2.5, 6.0] km from Landsat 8/9 IR data on Shanghai. T(r)-T_вҲһ вҲқ -ln(r/О»). D = turbulent diffusivity, k = radiative cooling rate."
    verified_at: "candidate"
  - phenomenon: "Excavation groundwater drawdown cone (еҹәеқ‘йҷҚж°ҙзҡ„ең°дёӢж°ҙжјҸж–—)"
    evidence: "Theis equation: drawdown s(r) вҲқ -ln(r) for steady radial flow. Same logarithmic decay."
    verified_at: "candidate"
  - phenomenon: "Maternal effect gene egg-axis polarization (жҜҚжәҗж•Ҳеә”еҹәеӣ )"
    evidence: "Morphogen gradient вҲӮc/вҲӮt = DвҲҮВІc - kc + source at one pole. Wolpert 1969 'French flag' model. Layer 3 high-confidence match."
    verified_at: "candidate"
  - phenomenon: "Heat conduction in finite slab with surface cooling"
    evidence: "Classic textbook reaction-diffusion. Same equation."
    verified_at: "candidate"
negative_examples:
  - phenomenon: "Turing patterns (Belousov-Zhabotinsky reactions)"
    reason: "Pattern formation requires non-linear reaction terms + diffusion instability (Turing condition D_v/D_u > critical). This class is LINEAR steady-state, no pattern. Belongs to reaction_diffusion_turing."
  - phenomenon: "Wave propagation (sound, light)"
    reason: "Wave equation вҲӮВІu/вҲӮtВІ = cВІвҲҮВІu is second-order in time вҖ” not diffusion. Different class."
  - phenomenon: "Sandpile slope distribution"
    reason: "Granular dynamics with threshold cascades; SOC, not linear reaction-diffusion. Belongs to soc_threshold_cascade."
  - phenomenon: "Turbulent eddy diffusion (Kolmogorov)"
    reason: "Nonlinear (Navier-Stokes), no source-sink steady state; different mechanism."
edge_cases:
  - phenomenon: "Magnetic dipole field"
    debate: "Same Laplace equation (вҲҮВІПҶ = 0 outside source) but no decay term k. Belongs to a sibling class 'Laplace equation steady-state'. Class boundary."
  - phenomenon: "Drug pharmacokinetics in tissue"
    debate: "Same equation with k = clearance rate. Belongs to this class. The compartmental approximation (point) is a coarser model in the same family."
references:
  - "Fick 1855 Ann. Physik 94, 59 (Fick's law)"
  - "Crank 1975 The Mathematics of Diffusion"
  - "Wolpert 1969 J. Theor. Biol. 25, 1 (positional information / morphogen)"
  - "Oke 1987 Boundary Layer Climates (urban heat island)"
  - "Theis 1935 Trans. Am. Geophys. Union 16, 519 (groundwater flow)"
