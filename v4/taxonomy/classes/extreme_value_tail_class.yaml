class_id: extreme_value_tail_class
status: emerging
display_name: Extreme value theory & heavy-tailed distributions
display_name_zh: 极值理论重尾分布
hub_phenomenon: Limiting distribution of maxima / threshold exceedances in independent samples, governed by GEV/GPD shape
  parameter ξ
shared_equation: "Fisher-Tippett-Gnedenko: F_n(x) = P(M_n ≤ x) → G_ξ((x-b_n)/a_n) where\n  G_ξ(z) = exp(-(1+ξz)^{-1/ξ}) (Generalized\
  \ Extreme Value).\nPickands-Balkema-de Haan (POT): for X > u,\n  P(X > u + y | X > u) ≈ (1 + ξy/σ)^{-1/ξ} (Generalized Pareto).\n\
  Tail index α = 1/ξ; ξ > 0 Fréchet (heavy), ξ = 0 Gumbel, ξ < 0 Weibull (bounded).\n"
key_invariants:
- GEV limiting form for block maxima
- GPD for threshold exceedances
- Shape parameter ξ characterizes regime (Fréchet/Gumbel/Weibull)
- Conditional expectation E[f(X) | X > u] ∝ ∫f(x)·α·x^{-α-1}dx / P(X > u)
- VaR_α and ES_α expressions purely from (μ, σ, ξ)
positive_examples:
- phenomenon: Catastrophe derivative extreme event pricing
  evidence: 'Hub of this cluster. Layer 3 high-confidence: shared invariant is GEV+POT structure for catastrophe loss tails.'
  verified_at: candidate
- phenomenon: Catastrophe bond extreme event hedging
  evidence: Same GEV+POT structure; VaR/ES estimation under GPD tails.
  verified_at: candidate
- phenomenon: Seed dispersal distance distributions (Acer/Quercus/Fraxinus)
  evidence: 'Layer 4 prediction: GPD shape ξ ∈ [0.25, 0.55] Fréchet-type from Lévy flight model. Candidate, not yet verified.'
  verified_at: candidate
- phenomenon: High-rise wind load extreme value distribution
  evidence: GEV(μ, σ, ξ) fit to annual peak wind pressures; structural reliability index β derived from VaR_α.
  verified_at: candidate
negative_examples:
- phenomenon: Earthquake magnitude (Gutenberg-Richter)
  reason: GR is a power-law for individual events, not for block maxima. The underlying mechanism is threshold cascade (SOC),
    not random extreme value sampling. While the tail of seismic energies is also Fréchet-type, the *generative* mechanism
    is SOC. Belongs to soc_threshold_cascade.
- phenomenon: Gaussian central limit theorem (sample mean)
  reason: CLT describes sample means, not maxima. The conjugate to EVT for sums. Different limiting distribution.
- phenomenon: Pareto income distribution
  reason: Empirically heavy-tailed but Pareto is the *static* distribution, not a limiting maxima distribution. Better classified
    under preferential_attachment (Yule-Simon generative mechanism). EVT statements apply to extreme quantiles of any distribution
    including Pareto.
- phenomenon: Stock returns inverse cubic
  reason: Generated by SOC threshold dynamics, not by independent block-maxima sampling. Tail is power-law but mechanism differs.
- phenomenon: Log-normal financial returns
  reason: "Despite high kurtosis, the tail decays faster than any power law, placing it in the Gumbel domain (ξ=0), not the heavy-tailed Fréchet domain. Thus it is incompatible with the heavy-tailed focus of this class."
- phenomenon: Stretched exponential turbulence dissipation
  reason: "Often mistaken for a power-law tail, but the stretched exponential form falls into the Gumbel domain, contradicting the heavy-tail requirement of the class."
- phenomenon: Intermittent chaos laminar lengths
  reason: "Deterministic low-dimensional chaos can yield apparent power-law distributed laminar phases, but the strong dependence violates the independence/mixing assumptions needed for classical GEV limit; the extremal behavior may not converge to GEV."
- phenomenon: Multiplicative cascade extremes
  reason: "Cascade models in turbulence generate multifractal fields with extreme values that may follow a log-stable or other distribution depending on cascade parameters, not necessarily the GEV, due to intrinsic scale-dependent correlations."
edge_cases:
- phenomenon: Insurance loss distribution
  debate: EVT is the standard tool but generative mechanism may be either independent Poisson claims (true EVT regime) or
    correlated catastrophic events (which violate independence and bring in copula structure, see tail_copula_contagion).
    Class membership depends on whether the loss process is well-modeled as iid.
- phenomenon: Network attack damage maxima
  debate: Damage from worst-case network attack could be EVT if attack timing is random, but is often a Motter-Lai-style cascade
    that produces heavy-tailed sizes by a *different* mechanism. Both classes match the data; which is generative matters
    for forecasting.
- phenomenon: Long-memory Gaussian process extremes
  debate: "While the marginal distribution is Gaussian (Gumbel), long-range dependence drastically slows convergence and can produce apparent heavy-tailed clustering; it's ambiguous whether classical EVT fully captures the extreme behavior in finite samples."
- phenomenon: Self-organized criticality event sizes
  debate: "Power-law event size distributions suggest Fréchet extremes, but the dynamically generated critical state with non-trivial correlations may invalidate the independence assumption, leading to debates on whether GEV limits apply."
- phenomenon: Mixture distributions with near-zero shape
  debate: "Mixtures (e.g., two Gaussians) can mimic heavy tails in the bulk but are Gumbel; estimating ξ from data often yields values near zero, making it difficult to distinguish from a light Fréchet or Gumbel, a classic boundary problem."
- phenomenon: Non-stationary climate extremes (with trend)
  debate: "Presence of a trend violates stationarity, a core EVT assumption; applying classical methods may yield misleading tail behavior, and the choice of detrending or non-stationary modeling blurs the boundary of the class."
references:
- Fisher, Tippett 1928 Math. Proc. Cambridge 24, 180 (limit theorems for maxima)
- Gnedenko 1943 Ann. Math. 44, 423 (foundational classification of EVT distributions)
- Pickands 1975 Ann. Stat. 3, 119 (POT / GPD)
- Balkema, de Haan 1974 Ann. Probab. 2, 792 (POT)
- Embrechts, Klüppelberg, Mikosch 1997 Modelling Extremal Events
- Coles 2001 An Introduction to Statistical Modeling of Extreme Values
