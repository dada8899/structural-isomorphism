class_id: motter_lai_network_cascade__threshold_contagion
status: speculative
display_name: Watts threshold contagion (neighbor-fraction activation, non-conserved)
display_name_zh: Watts 阈值传染 (邻居比例激活, 非守恒)
hub_phenomenon: Each node activates when fraction of active neighbors exceeds threshold φ_i. No conserved quantity flows;
  cascade size distribution differs from Motter-Lai.
shared_equation: "Motter-Lai 2002 load redistribution: when node j fails,\n  L_k ← L_k + share_{jk} · L_j for k ∈ N(j),\n\
  \  where share_{jk} = w_jk / Σ_m w_jm.\nFailure rule: node fails iff L_j > C_j.\nEisenberg-Noe 2001 clearing vector: p =\
  \ min(p̄, L^T p + e); existence/uniqueness via fixed-point.\nTolerance parameter α = C/L; cascade phase transition at α_c.\n"
key_invariants:
- 'Cascade size distribution: P(s) ∝ s^{-τ}, τ ∈ [1.5, 2.0] (mean-field)'
- Critical tolerance ratio α_c ∈ [0.1, 0.3] for typical infrastructure topologies
- 'Sub-α_c: largest cascade / N ≥ 0.15 (system-spanning failures)'
- Eisenberg-Noe clearing vector exists & is unique under acyclic-default ordering
- Cascade duration ∝ network diameter
positive_examples:
- phenomenon: DeFi cross-protocol liquidation cascades (Aave+Compound+Maker, 2020-2024)
  evidence: Per-protocol α = 1.57-1.68 (close to mean-field cascade τ); 1-hour Omori p ≈ 0.7 consistent with cascade aftershock
    structure. Paper records this as a sub-cluster of SOC threshold cascade with Motter-Lai mechanism explicitly identified.
  verified_at: '2026-04-16'
  paper: v4/validation/soc-defi/paper.md
- phenomenon: Building progressive collapse (土木工程)
  evidence: 'Layer 3 mechanism graph: column failure → load redistribution to neighbors → secondary failures (Motter-Lai cascade
    on building structural graph). Candidate class member; quantitative validation not yet performed.'
  verified_at: candidate
- phenomenon: 电网连锁故障 (power grid cascading failure)
  evidence: NERC TADS publicly documents grid cascade events with Motter-Lai-compatible signatures. Phase 12 planned. Currently
    candidate, not yet Layer 5 verified.
  verified_at: candidate
- phenomenon: Social-network cascading failure (Watts threshold model)
  evidence: 'Mechanism graph match: threshold cascade f(x_i) = Θ(Σ w_ij x_j - θ_i). Candidate class member.'
  verified_at: candidate
- phenomenon: Plasma sub-chain mass exit (Ethereum L2)
  evidence: Cascade mechanism analogous to bank run on rollup exit queue. Candidate.
  verified_at: candidate
negative_examples:
- phenomenon: S&P 500 daily price moves
  reason: Continuous diffusion process; no discrete capacity threshold per node. Belongs to a continuous-diffusion sub-class
    of SOC, NOT the discrete threshold cascade Motter-Lai class.
- phenomenon: Social media viral retweet cascade
  reason: Surface power-law cascade size distribution but generated by preferential-attachment + homophily, not capacity-redistribution.
    No 'load' that exceeds 'capacity' here.
- phenomenon: SIR epidemic spread
  reason: Mass-action contact transmission with constant β; no load redistribution. Belongs to sir_contagion_network_class.
- phenomenon: Earthquake aftershock sequence
  reason: 'Edge case: Coulomb-stress redistribution IS a form of load redistribution, but the geometry is continuous 3D elastic,
    not discrete network. Better classified under soc_threshold_cascade with continuous (Olami-Feder-Christensen) rather than
    discrete-network (Motter-Lai) sub-class.'
- phenomenon: k-core percolation / absolute threshold bootstrap percolation
  reason: "Activation requires a fixed number of active neighbors (e.g., at least 2), not a fraction; the threshold is absolute and independent of node degree, making the process degree-sensitive and incompatible with the fraction-based condition."
- phenomenon: Voter model
  reason: "Node adopts a neighbor's state chosen uniformly at random; there is no threshold mechanism and adoption probability does not depend on the fraction of like-minded neighbors, contrasting with the deterministic fraction-exceeding activation."
- phenomenon: SIR epidemic model with fixed transmission rate per contact
  reason: "Infection is a stochastic per-contact event, not a deterministic activation when a fraction of infected neighbors exceeds a threshold; no conserved quantity but entirely different dynamics."
- phenomenon: Linear threshold model with unnormalized edge weights
  reason: "Node activates when total incoming weight from active neighbors exceeds a threshold, which is an absolute sum, not a fraction of neighbors; this lacks the normalization to neighbor count, thus not neighbor-fraction activation."
- phenomenon: Majority vote model with noise
  reason: "Node flips to the majority state of neighbors with a probability depending on a temperature parameter; it is a stochastic spin-flip process, not a deterministic cascade activation upon exceeding a fixed fraction threshold."
edge_cases:
- phenomenon: Bank run / 银行挤兑
  debate: Diamond-Dybvig original bank run is multistable_self_fulfilling (coordination game on expectations). But interconnected
    banking system cascades via Eisenberg-Noe clearing — a structural cousin of Motter-Lai. Member of both classes depending
    on whether you focus on individual bank dynamics or interbank network.
- phenomenon: Traffic flow lockup at intersections (路口溢流锁死)
  debate: Queue length > capacity → spillback to upstream → blocking cycle. Topologically a Motter-Lai-style cascade on a
    road network, but the load dynamics are time-asymmetric (queues drain via signals). Worth a formal sub-class study.
- phenomenon: "Probabilistic threshold contagion (soft threshold, e.g., logistic activation)"
  debate: "Activation probability is a sigmoidal function of the fraction of active neighbors; as steepness → ∞ it approaches the sharp threshold, but for finite steepness it is stochastic. The original class implies deterministic activation, so the inclusion of stochasticity is ambiguous."
- phenomenon: Threshold contagion with heterogeneous thresholds including zero (seed nodes)
  debate: "Some nodes have φ_i=0 (always active instantly) which may induce spontaneous activations, effectively introducing a random field. While still fraction-based, this could alter universality class; it is unclear if the presence of such seeds breaks the class membership."
- phenomenon: Fraction-threshold cascade on directed networks (in-neighbor fraction)
  debate: "Fraction is computed only over in-neighbors, which is a natural extension to directed graphs. However, the definition of 'neighbor' may be contested, and the dynamics on directed versus undirected graphs could lead to distinct critical behavior, making the boundary fuzzy."
- phenomenon: "Bootstrap percolation defined with fraction threshold (e.g., activate if ≥ f*k neighbors active)"
  debate: "This is mathematically identical to the Watts threshold model on fixed-degree graphs, but bootstrap percolation often uses integer thresholds; when the threshold is a real fraction, the discretization (ceiling) could alter the sharpness of the transition, potentially placing it at the edge of the class."
- phenomenon: Threshold model with temporal memory decay (exposure over sliding window)
  debate: "Activation depends on the fraction of neighbors that have been active within a recent time window rather than instantaneously. The introduction of memory complicates the driving mechanism; it might still belong if the memory is short, but could lead to different universality."
references:
- Motter, Lai 2002 Phys. Rev. E 66, 065102 (load redistribution cascade)
- Eisenberg, Noe 2001 Manag. Sci. 47, 236 (clearing vector existence/uniqueness)
- Watts 2002 PNAS 99, 5766 (threshold cascades on social networks)
- Buldyrev, Parshani, Paul, Stanley, Havlin 2010 Nature 464, 1025 (catastrophic cascades on interdependent networks)
- Crucitti, Latora, Marchiori 2004 Phys. Rev. E 69, 045104 (cascade in power grids)
