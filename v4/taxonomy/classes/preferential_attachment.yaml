class_id: preferential_attachment
status: well-established
display_name: Preferential attachment scale-free network
display_name_zh: 偏好连接幂律网络
hub_phenomenon: Attention/connection/resource allocation under 'rich-get-richer' dynamics producing scale-free degree distributions
shared_equation: 'Attachment kernel: P(new edge attaches to node i) ∝ k_i^α (α=1 for Barabási-Albert).

  Continuum mean-field: dk_i/dt = m · k_i / Σ_j k_j → k_i(t) = m · (t/t_i)^{1/2}.

  Steady-state degree distribution: P(k) ∝ k^{-γ}, γ = 1 + 1/α (γ=3 for BA).

  Yule-Simon equivalent: master equation for "preferential copying with innovation rate p" gives γ = 1 + 1/(1-p).

  '
key_invariants:
- 'Power-law degree distribution: P(k) ∝ k^{-γ}, γ ∈ [2, 3] (BA prediction γ=3)'
- 'Small-world topology: average path length L ~ log(N) / log(log(N))'
- 'Hub-dominated topology: top 1% of nodes carry ≥ 30% of total connections'
- Scale-free / no characteristic degree below upper cutoff
- Linear (or super-linear if α>1) attachment-probability kernel
positive_examples:
- phenomenon: GitHub repository star counts (top 8,398 repos by GitHub Search API, 2026-05)
  evidence: 'Phase 6: Clauset α = 2.867 ± 0.050, bootstrap 95% CI [2.781, 3.000], x_min = 25,585 stars, n_tail = 1,417 above
    x_min; inside BA prediction band [2.0, 3.0] and inside literature meta-range [1.8, 3.5]; vs exponential R = +5.45 (p =
    5.2×10^-8); vs lognormal R = -1.45 (inconclusive, p = 0.147). Per-language fits: Python α=2.75, JavaScript α=3.00, TypeScript
    α=2.85, Go α=2.65, C++ α=2.98, Java α=2.61 — narrow spread across 6 languages. All 3 synthetic null distributions rejected
    by the same pipeline.'
  verified_at: '2026-05-13'
  paper: v4/validation/soc-github-stars/paper.md
negative_examples:
- phenomenon: Earthquake magnitude distribution (Gutenberg-Richter)
  reason: Heavy-tailed but generated by stress-redistribution threshold cascade (Olami-Feder-Christensen), not by node-attachment
    growth. There is no 'new earthquake' attaching to existing earthquakes by degree. Belongs to soc_threshold_cascade.
- phenomenon: DeFi liquidation cascade size distribution
  reason: Power-law tail but generated by Motter-Lai-style load redistribution on a fixed (not growing) network. The graph
    is the protocol topology, which does not evolve via preferential attachment during a cascade. Belongs to soc_threshold_cascade
    / motter_lai_network_cascade.
- phenomenon: Pure Yule random branching trees
  reason: Same power-law signature P(k) ∝ k^{-γ} arises but via the Yule pure-birth process without preferential element.
    While Yule is a limiting case of BA (often grouped together), strict preferential attachment requires k-dependent attachment
    kernel, which the Yule pure-birth lacks. Treat as boundary case.
- phenomenon: Wildfire size distribution
  reason: Heavy-tail but no 'new fire attaches to large existing fire' mechanism. Each fire is an independent threshold-cascade
    burn event. Belongs to soc_threshold_cascade.
- phenomenon: Citation distribution under fitness model
  reason: 'Edge case: Bianconi-Barabási 2001 fitness model generalizes BA with quality heterogeneity. While related, fitness-driven
    inhomogeneous attachment is a strict superset of BA, and the resulting degree distribution can deviate from γ=3 power-law
    toward a stretched form. Keep in preferential_attachment class but flag fitness-induced deviation.'
edge_cases:
- phenomenon: Citation networks (de Solla Price 1965, Redner 1998)
  debate: Canonical positive example in the literature — but exponent γ varies by field (physics ~3, social sciences ~2.5),
    suggesting field-specific attachment kernels. Predate BA 1999. Keep in preferential_attachment class with sub-field exponent
    variation noted.
- phenomenon: WWW link distribution (Barabási, Albert, Jeong 1999)
  debate: γ ≈ 2.1 for in-degree, 2.7 for out-degree — different from BA prediction of 3. Bilateral attachment (links can attach
    in two directions) modifies the master equation. Class membership accepted with γ < 3 due to bilateral structure.
- phenomenon: Protein-protein interaction networks
  debate: Heavy-tailed degree distribution but generated by gene duplication + selective loss, not by literal preferential
    attachment of new proteins to high-degree existing ones. Vázquez et al. 2003 showed duplication-divergence models reproduce
    BA-like exponents. Class assignment debated; we keep in preferential_attachment because the macroscopic invariant is the
    same.
references:
- Yule 1925 Phil. Trans. Roy. Soc. B 213, 21 (original cumulative-advantage in species)
- Simon 1955 Biometrika 42, 425 (Yule-Simon process for word frequencies)
- Price 1965 Science 149, 510 (citation distributions)
- Barabási, Albert 1999 Science 286, 509 (modern formulation, BA model)
- Albert, Barabási 2002 Rev. Mod. Phys. 74, 47 (statistical mechanics of networks review)
- Newman 2005 Contemp. Phys. 46, 323 (power laws, Pareto distributions, Zipf review)
- Bianconi, Barabási 2001 Phys. Rev. Lett. 86, 5632 (fitness model extension)
- Vázquez, Flammini, Maritan, Vespignani 2003 ComPlexUs 1, 38 (duplication-divergence for protein networks)
- Clauset, Shalizi, Newman 2009 SIAM Rev. 51, 661 (statistical methods)
