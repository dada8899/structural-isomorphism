# ---------------------------------------------------------------------------
# Adversarial pre-registration: r/wallstreetbets post-arrival Hawkes / Omori
#
# Locked BEFORE data acquisition. Same paper §8 discipline.
# ---------------------------------------------------------------------------

system: wsb-posts
pre_registered_at: 2026-05-14
pre_registration_session: session-7-W1-C
author: dada8899
class_id: soc_hawkes_omori   # Hawkes / Omori-law aftershock decay
universality_class: SOC threshold cascade with Omori-Utsu temporal decay

# Two predictions for r/wallstreetbets posting cascades:
#   (P1) post-arrival inter-event times after a viral root post follow
#        Omori decay rate ~ (t + c)^(-p) with p in [0.7, 1.3] (Hawkes/Omori).
#   (P2) cascade-size distribution (comment count, upvote count, downstream
#        re-post chain) is power-law with alpha in [1.7, 2.3] (PA + cascade).
# Pre-register P1 as PRIMARY (clearer falsifiability), P2 as secondary.

predicted_exponent: 1.0       # Omori p
predicted_band: [0.7, 1.3]
predicted_secondary_exponent: 2.0   # cascade-size alpha
predicted_secondary_band: [1.7, 2.3]

reasoning: |
  PRIMARY hypothesis (P1): r/wallstreetbets viral-post aftermath follows
  Omori-law temporal decay of subsequent posts/comments.

  Theoretical anchor: Crane-Sornette 2008 on YouTube view bursts; Omori-law
  with p ~ 0.6-1.4 emerges from cascading attention dynamics. Social-media
  cascades have been independently shown to exhibit Hawkes/Omori structure
  (Mishra et al. 2016, Rizoiu et al. 2017).

  Predicted point estimate p = 1.0 (Bath-canonical mid-band).
  Band [0.7, 1.3] is the Sornette-Helmstetter range for endogenous bursts.

  SECONDARY hypothesis (P2): cascade size (comments per viral root post)
  follows power-law alpha ~ 2.0. Anchor: paper §8.2 P2 (Reddit cascade
  alpha ~ 2.0 +/- 0.3, derived from Adamic-Huberman PA). Predicted band
  [1.7, 2.3].

  ADVERSARIAL ASPECT: WSB was NOT used in any v4 calibration. The Hawkes/
  Omori band is anchored on Crane-Sornette + earthquake aftershock literature.

  WHY ADVERSARIAL: WSB has a known regime shift in early 2021 (GameStop
  squeeze) which may break Omori stationarity. We pre-commit to fitting
  both the full series AND pre-2021 separately to test robustness.

data_source: Pushshift Reddit archive (post timestamps + comment counts)
data_url: https://files.pushshift.io/reddit/
data_source_fallback: archive.org Reddit dump (pre-2023 coverage)
data_url_fallback: https://archive.org/details/pushshift-reddit
data_license: public archive (Reddit ToS compliant for academic use)
data_size_estimate: ~10-50M WSB posts/comments 2016-2024
sample_size_target: ">=1000 viral root posts (>= 100 child comments each)"

extraction_method: |
  1. Pull r/wallstreetbets posts from Pushshift archive (or fallback).
  2. Identify "viral roots" = posts with >= 100 comments.
  3. For each viral root: collect timestamps of all subsequent comments
     within +7 days, compute inter-event times.
  4. Stack inter-event times across all viral roots (block-bootstrap-safe
     temporal stacking).
  5. Fit Omori law via v4/scripts/phase14_hawkes_fit.py:
        rate(t) = K / (t + c)^p
  6. Secondary: extract per-root cascade-size = (comment count) and fit
     Clauset power-law on the cross-sectional distribution.

verification_method: |
  PRIMARY (Omori p):
  - Non-linear least-squares fit of rate(t) = K / (t + c)^p
  - Bootstrap CI for p via resampling viral roots
  - Compare to non-Hawkes Poisson null

  SECONDARY (cascade-size alpha):
  - Clauset power-law fit (same as soc_pipeline.fit_clauset_powerlaw)
  - Vuong test vs log-normal, exponential

null_hypothesis_alternatives:
  primary:
    - poisson_constant_rate
    - exponential_decay
  secondary:
    - log_normal
    - exponential
    - stretched_exponential

success_criteria:
  - "PRIMARY: p_hat in [0.7, 1.3] AND poisson null rejected at p < 0.01"
  - "SECONDARY: alpha_hat in [1.7, 2.3] AND power-law not decisively rejected"
  - "n_viral_roots >= 500 after filter"

verdict_rules:
  PASS: PRIMARY in band AND Poisson null rejected
  PARTIAL: PRIMARY in band but SECONDARY out, or vice-versa
  FAIL: PRIMARY outside band
  INCONCLUSIVE: insufficient viral roots OR data extraction blocked

calibration_independence:
  - Was WSB data used in any v4 phase calibration? NO
  - Was any subreddit data used to set v4 bands? NO (only Wikipedia views were)
  - Are anchors from independent literature only? YES (Crane-Sornette 2008, Mishra 2016)

risks_and_caveats:
  - 2021 GameStop squeeze is a known regime-shift event; pre-commit to
    reporting BOTH full-series fit AND pre-2021 fit.
  - Pushshift access has been restricted post-2023 Reddit API changes;
    fallback path = archive.org Pushshift dump (pre-2023 coverage only,
    which actually helps with the regime-shift concern).
  - Comment-count cascade size is administratively rate-limited by Reddit
    spam filters; document but do not adjust.
