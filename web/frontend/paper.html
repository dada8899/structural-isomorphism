  <script>
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      const pathMatch = window.location.pathname.match(/^\/paper\/([a-zA-Z0-9\-_]+)/);
      let docSlug = (pathMatch && pathMatch[1]) || urlParams.get("doc") || "soc-earthquake-2026-04-15";
      // whitelist against directory traversal
      docSlug = docSlug.replace(/[^a-zA-Z0-9\-_]/g, "");
      if (!docSlug) docSlug = "soc-earthquake-2026-04-15";
      const mdUrl = `/assets/data/papers/${docSlug}.md`;
      const target = document.getElementById("paper-article");
      const dl = document.getElementById("paper-download-md");
      if (dl) dl.href = mdUrl;

      function render(md) {
        if (typeof marked === "undefined") {
          target.innerHTML = "<p style='color:#c44;'>Markdown 渲染器加载失败.</p>";
          return;
        }
        marked.setOptions({ gfm: true, breaks: false });
        const html = marked.parse(md);
        target.innerHTML = html;
        // Extract first h1 as title
        const h1 = target.querySelector("h1");
        if (h1) {
          document.getElementById("paper-title").textContent = h1.textContent + " — Structural";
        }
        if (window.renderMathInElement) {
          try {
            window.renderMathInElement(target, {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "\\[", right: "\\]", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
              ],
              throwOnError: false,
            });
          } catch (e) {
            console.warn("KaTeX render failed", e);
          }
        }
      }

      fetch(mdUrl)
        .then((r) => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.text();
        })
        .then((md) => {
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", () => render(md));
          } else {
            render(md);
          }
        })
        .catch((e) => {
          target.innerHTML = `<p style="color:#c44; text-align:center; padding:60px 0;">论文加载失败: ${e.message}</p>`;
        });
    })();
  </script>
  <script src="/assets/js/product-switcher.js?v=20260416a"></script>
